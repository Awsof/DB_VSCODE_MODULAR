pages.pacotes = async function() {
  updateTopbar('Pacotes', 'Gestão de pacotes de implantação', `<button class="btn" id="new-pac-btn">+ Novo Pacote</button>`);

  const [pacotes, registros, clientes, sistemas, chamados] = await Promise.all([
    dbAll('pacotes'), dbAll('pacote_registros'), dbAll('clientes'), dbAll('sistemas'), dbAll('chamados')
  ]);
  const clienteByCode = {}; for (const c of clientes) clienteByCode[c.Codigo] = c;
  const sysById = {}; for (const s of sistemas) sysById[s.id] = s;
  const analistaSet = [...new Set(chamados.map(ch=>ch.analista).filter(Boolean))].sort();

  async function renderPacotes() {
    // Re-fetch from DB for immediate post-save state update
    const [pacotes, _regs] = await Promise.all([dbAll('pacotes'), dbAll('pacote_registros')]);
    const pacoteIds = new Set(pacotes.map(pk => pk.id));
    const registros = _regs.filter(r => pacoteIds.has(r.fk_pacote));
    const container = document.getElementById('pac-list');
    if (!container) return;
    if (!pacotes.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">Nenhum pacote cadastrado</div></div>`;
      return;
    }
    container.innerHTML = pacotes.map(pk => {
      const regs = registros.filter(r => r.fk_pacote === pk.id);
      const sys = sysById[pk.fk_sistema];
      return `<div class="pacote-card">
        <div class="pacote-header">
          <div>
            <div class="pacote-nome">${pk.nome}</div>
            <div class="pacote-meta">${sys?.nome||'—'} · ${pk.qtdPacotes||0} pacote(s) · R$ ${Number(pk.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:12px;color:rgba(255,255,255,.6)">${regs.length} lab(s) registrado(s)</span>
            ${pk.dataAprovacao ? `<span style="font-size:11px;color:rgba(255,255,255,.5)">Aprovado: ${pk.dataAprovacao}</span>` : ''}
            <button class="btn sm secondary" data-edit-pac="${pk.id}" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:white">Editar</button>
            <button class="btn sm" data-add-reg="${pk.id}">+ Lab</button>
          </div>
        </div>
        <div class="pacote-body">
          ${regs.length === 0 ? `<div style="font-size:12px;color:var(--text3)">Nenhum laboratório registrado neste pacote.</div>` :
            `<table style="width:100%;font-size:12px"><thead><tr>
              <th>Código</th><th>Laboratório</th><th>Chamado</th><th>Analista</th><th>Data Registro</th><th></th>
            </tr></thead><tbody>
              ${regs.map(r => {
                const c = clienteByCode[r.fk_cliente];
                return `<tr>
                  <td style="font-family:var(--mono);color:var(--text3)">${r.fk_cliente}</td>
                  <td>${c?(c.NomeFantasia||c.RazaoSocial):'—'}</td>
                  <td>${r.numeroChamado||'—'}</td>
                  <td>${r.analista||'—'}</td>
                  <td>${r.dataRegistro||'—'}</td>
                  <td><button class="btn sm secondary" style="font-size:10px;padding:3px 7px" data-del-reg="${r.id}">×</button></td>
                </tr>`;
              }).join('')}
            </tbody></table>`}
        </div>
      </div>`;
    }).join('');

    container.querySelectorAll('[data-edit-pac]').forEach(btn => {
      btn.addEventListener('click', () => openPacoteModal(parseInt(btn.dataset.editPac), sistemas, () => renderPacotes().catch(console.error)));
    });
    container.querySelectorAll('[data-add-reg]').forEach(btn => {
      btn.addEventListener('click', () => openPacoteRegModal(parseInt(btn.dataset.addReg), clientes, chamados, analistaSet, () => renderPacotes().catch(console.error)));
    });
    container.querySelectorAll('[data-del-reg]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Remover este laboratório do pacote?')) return;
        await dbDelete('pacote_registros', parseInt(btn.dataset.delReg));
        toast('Removido.','info'); renderPacotes().catch(console.error);
      });
    });
  }

  document.getElementById('content').innerHTML = `<div id="pac-list"></div>`;
  renderPacotes();
  document.getElementById('new-pac-btn').addEventListener('click', () => openPacoteModal(null, sistemas, () => renderPacotes().catch(console.error)));
};

function openPacoteModal(id, sistemas, refresh) {
  Promise.resolve(id ? dbGet('pacotes', id) : null).then(pk => {
    const isNew = !pk;
    pk = pk || { nome:'', fk_sistema:'', valor:0, qtdPacotes:1, dataAprovacao:'' };
    const overlay = openModal(`
      <div class="modal-header">
        <div class="modal-title">${isNew?'Novo Pacote':'Editar Pacote'}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="field-group"><div class="field-label">Nome do Pacote *</div><input type="text" id="pk-nome" value="${pk.nome||''}"></div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Sistema</div>
            <select id="pk-sys"><option value="">— Nenhum —</option>${sistemas.map(s=>`<option value="${s.id}" ${s.id==pk.fk_sistema?'selected':''}>${s.nome}</option>`).join('')}</select>
          </div>
          <div class="field-group"><div class="field-label">Data de Aprovação</div><input type="date" id="pk-dt" value="${pk.dataAprovacao||''}"></div>
        </div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Valor (R$)</div><input type="number" id="pk-val" value="${pk.valor||0}" min="0" step="0.01"></div>
          <div class="field-group"><div class="field-label">Quantidade de Pacotes</div><input type="number" id="pk-qtd" value="${pk.qtdPacotes||1}" min="1" step="1"></div>
        </div>
      </div>
      <div class="modal-footer">
        ${!isNew?`<button class="btn danger" id="del-pac">Excluir</button>`:''}
        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="save-pac">Salvar</button>
      </div>
    `);
    if (!isNew) overlay.querySelector('#del-pac')?.addEventListener('click', async () => {
      if (!confirm('Excluir este pacote?')) return;
      await dbDelete('pacotes', id); toast('Pacote excluído.','info'); closeModal(); refresh();
    });
    overlay.querySelector('#save-pac').addEventListener('click', async () => {
      const nome = overlay.querySelector('#pk-nome').value.trim();
      if (!nome) { toast('Nome obrigatório.','error'); return; }
      const data = {
        nome,
        fk_sistema: parseInt(overlay.querySelector('#pk-sys').value)||null,
        valor: parseFloat(overlay.querySelector('#pk-val').value)||0,
        qtdPacotes: parseInt(overlay.querySelector('#pk-qtd').value)||1,
        dataAprovacao: overlay.querySelector('#pk-dt').value,
      };
      if (!isNew) data.id = id;
      await (isNew ? dbAdd : dbPut)('pacotes', data);
      await auditLog(isNew?'Criou pacote':'Editou pacote', data.nome);
      toast(isNew?'Pacote criado.':'Pacote atualizado.','success');
      closeModal(); refresh();
    });
  });
}

function openPacoteRegModal(fk_pacote, clientes, chamados, analistaSet, refresh) {
  const overlay = openModal(`
    <div class="modal-header">
      <div class="modal-title">Registrar Laboratório no Pacote</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="two-col">
        <div class="field-group"><div class="field-label">Código do Laboratório *</div><input type="text" id="reg-cod" placeholder="Ex: 12345"></div>
        <div class="field-group"><div class="field-label">Número do Chamado</div><input type="text" id="reg-ch" placeholder="Ex: INC-0042"></div>
      </div>
      <div class="two-col">
        <div class="field-group"><div class="field-label">Analista</div>
          <input type="text" id="reg-ana" list="reg-ana-list" placeholder="Nome do analista">
          <datalist id="reg-ana-list">${analistaSet.map(a=>`<option value="${a}">`).join('')}</datalist>
        </div>
        <div class="field-group"><div class="field-label">Data do Registro</div><input type="date" id="reg-dt"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn" id="save-reg">Registrar</button>
    </div>
  `);
  overlay.querySelector('#save-reg').addEventListener('click', async () => {
    const fk_cliente = overlay.querySelector('#reg-cod').value.trim();
    if (!fk_cliente) { toast('Código do laboratório obrigatório.','error'); return; }
    await dbAdd('pacote_registros', {
      fk_pacote, fk_cliente,
      numeroChamado: overlay.querySelector('#reg-ch').value.trim(),
      analista: overlay.querySelector('#reg-ana').value.trim(),
      dataRegistro: overlay.querySelector('#reg-dt').value,
    });
    toast('Laboratório registrado no pacote.','success');
    closeModal(); refresh();
  });
}

// ===================== PAGE: DASHBOARD FINANCEIRO =====================
pages.dashboard_financeiro = async function() {
  updateTopbar('Dashboard Financeiro', 'Visão gerencial de propostas, pacotes e budget', `<button class="btn-report" id="dash-fin-report">📄 Gerar Relatório</button>`);

  const [propostas, pacotes, _allRegistros, sistemas, budgetRecs] = await Promise.all([
    dbAll('propostas'), dbAll('pacotes'), dbAll('pacote_registros'), dbAll('sistemas'), dbAll('budget')
  ]);
  // Exclude registros whose pacote was deleted (orphaned records)
  const pacoteIds = new Set(pacotes.map(pk => pk.id));
  const pacote_registros = _allRegistros.filter(r => pacoteIds.has(r.fk_pacote));
  const sysById={}; for(const s of sistemas) sysById[s.id]=s;

  const anoAtual = new Date().getFullYear();
  const budgetRec = budgetRecs.find(b=>b.ano===anoAtual) || {ano:anoAtual, valorBudget:0};

  // Budget calculations
  const propAnuais = propostas.filter(p=>(p.dataAprovacao||'').startsWith(String(anoAtual)) && (p.status==='aprovada'||p.status==='paga'));
  const totalPropAprov = propAnuais.reduce((s,p)=>s+(p.valorProposta||0),0);
  const totalMensAprov  = propAnuais.reduce((s,p)=>s+(p.valorMensalidade||0),0) * 12; // annual mensalidade
  // Include paid pacotes in budget consumption (pacotes approved/paid this year)
  const pacotesAnuais = pacotes.filter(pk=>(pk.dataAprovacao||'').startsWith(String(anoAtual)));
  const totalPacotes  = pacotesAnuais.reduce((s,pk)=>s+((pk.valor||0)*(pk.qtdPacotes||1)),0);
  const totalConsumido  = totalPropAprov + totalMensAprov + totalPacotes;
  const budgetRestante  = budgetRec.valorBudget - totalConsumido;
  const pctUsado = budgetRec.valorBudget > 0 ? Math.min((totalConsumido / budgetRec.valorBudget)*100, 100) : 0;
  const barColor = pctUsado > 90 ? '#d63031' : pctUsado > 70 ? '#C49B3C' : '#0F9B94';

  // Chart datasets
  const byMonth={}; for(const p of propostas){const m=(p.dataLancamento||'').slice(0,7);if(!m)continue;if(!byMonth[m])byMonth[m]={total:0,aprovado:0,pago:0};byMonth[m].total++;if(p.status==='aprovada')byMonth[m].aprovado++;if(p.status==='paga')byMonth[m].pago++;}
  const months=Object.keys(byMonth).sort().slice(-12);
  const statusData=[{label:'Pendente',val:propostas.filter(p=>p.status==='pendente').length,color:'#C49B3C'},{label:'Aprovada',val:propostas.filter(p=>p.status==='aprovada').length,color:'#0F9B94'},{label:'Paga',val:propostas.filter(p=>p.status==='paga').length,color:'#003761'},{label:'Cancelada',val:propostas.filter(p=>p.status==='cancelada').length,color:'#d63031'}].filter(x=>x.val>0);
  const sysCount={}; for(const p of propostas){if(!p.fk_sistema)continue;const n=sysById[p.fk_sistema]?.nome||String(p.fk_sistema);sysCount[n]=(sysCount[n]||0)+1;}
  const topSys=Object.entries(sysCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const PALETTE=['#003761','#0F9B94','#C49B3C','#6c5ce7','#00b894','#d63031','#0984e3','#00cec9'];

  const valorByMonth={}; for(const p of propostas){const m=(p.dataAprovacao||'').slice(0,7);if(!m||(p.status!=='aprovada'&&p.status!=='paga'))continue;if(!valorByMonth[m])valorByMonth[m]=0;valorByMonth[m]+=(p.valorProposta||0);}
  const valMonths=Object.keys(valorByMonth).sort().slice(-12);

  // Date range state for financial charts
  const finDateState = { prop_ini:'', prop_fim:'', mens_ini:'', mens_fim:'' };

  // Mensalidades by month (grouped by dataAprovacao of approved/paid proposals)
  const mensByMonth={};
  for(const p of propostas){
    const m=(p.dataAprovacao||'').slice(0,7);
    if(!m||(p.status!=='aprovada'&&p.status!=='paga')) continue;
    if(!mensByMonth[m]) mensByMonth[m]=0;
    mensByMonth[m]+=(p.valorMensalidade||0);
  }

  const DATASETS={
    'prop_mes':    {label:'Propostas por Mês',        type:'bar', multi:true,  hasDateRange:'prop',
      data:(ini,fim)=>{
        const mf=months.filter(m=>(!ini||m>=ini.slice(0,7))&&(!fim||m<=fim.slice(0,7)));
        return {labels:mf,multiDatasets:[
          {label:'Total',data:mf.map(m=>byMonth[m]?.total||0),color:'#003761'},
          {label:'Aprovada',data:mf.map(m=>byMonth[m]?.aprovado||0),color:'#0F9B94'},
          {label:'Paga',data:mf.map(m=>byMonth[m]?.pago||0),color:'#C49B3C'},
        ]};
      }},
    'prop_status': {label:'Status das Propostas',     type:'doughnut', multi:false, data:()=>({labels:statusData.map(x=>x.label),vals:statusData.map(x=>x.val),colors:statusData.map(x=>x.color)})},
    'sys_prop':    {label:'Sistemas por Propostas',   type:'bar',      multi:false, data:()=>({labels:topSys.map(x=>x[0]),vals:topSys.map(x=>x[1]),colors:PALETTE})},
    'mens_mes':    {label:'Mensalidades por Mês',     type:'bar',      multi:false, hasDateRange:'mens',
      data:(ini,fim)=>{
        const ms=Object.keys(mensByMonth).sort().filter(m=>(!ini||m>=ini.slice(0,7))&&(!fim||m<=fim.slice(0,7)));
        return {labels:ms,vals:ms.map(m=>mensByMonth[m]),colors:ms.map((_,i)=>PALETTE[i%PALETTE.length])};
      }},
    'pac_val':     {label:'Valor por Pacote',         type:'bar', multi:false, data:()=>{const p=[...pacotes].sort((a,b)=>((b.valor||0)*(b.qtdPacotes||1))-((a.valor||0)*(a.qtdPacotes||1))).slice(0,8);return{labels:p.map(x=>x.nome.slice(0,18)),vals:p.map(x=>(x.valor||0)*(x.qtdPacotes||1)),colors:PALETTE};}},
    'budget_pie':  {label:'Budget Anual (Uso)',       type:'doughnut', multi:false, data:()=>({labels:['Propostas','Mensalidades','Pacotes','Disponível'],vals:[Math.max(totalPropAprov,0),Math.max(totalMensAprov,0),Math.max(totalPacotes,0),Math.max(budgetRestante,0)],colors:['#003761','#0F9B94','#C49B3C','#e4e8ef']})},
  };

  const CHART_IDS=['dcf-0','dcf-1','dcf-2','dcf-3'];
  const chartInstances={};
  const chartChoices={'dcf-0':'prop_mes','dcf-1':'prop_status','dcf-2':'sys_prop','dcf-3':'mens_mes'};

  function buildSelect(id){
    const dateRangeHtml=`<div id="frange-${id}" style="display:none;gap:4px;align-items:center;margin-top:6px;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--text3)">De:</span>
      <input type="month" style="font-size:11px;padding:2px 5px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none" oninput="window._finDateChange('${id}',DATASETS[chartChoices['${id}']]?.hasDateRange,'ini',this.value)">
      <span style="font-size:10px;color:var(--text3)">Até:</span>
      <input type="month" style="font-size:11px;padding:2px 5px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none" oninput="window._finDateChange('${id}',DATASETS[chartChoices['${id}']]?.hasDateRange,'fim',this.value)">
    </div>`;
    return `<div><select class="dyn-chart-select" data-chart-id="${id}" onchange="window._finDashChange(this)">
      ${Object.entries(DATASETS).map(([k,v])=>`<option value="${k}" ${chartChoices[id]===k?'selected':''}>${v.label}</option>`).join('')}
    </select>${dateRangeHtml}</div>`;
  }

  function renderChart(id){
    const key=chartChoices[id]; const ds=DATASETS[key];
    if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}
    const ctx=document.getElementById(`canvas-${id}`);if(!ctx)return;
    const isDonut=ds.type==='doughnut';

    // Show/hide date range for this chart
    const rangeWrap=document.getElementById(`frange-${id}`);
    if(rangeWrap) rangeWrap.style.display=ds.hasDateRange?'flex':'none';

    // Call data() with date range if supported
    const ini = ds.hasDateRange==='prop' ? finDateState.prop_ini : ds.hasDateRange==='mens' ? finDateState.mens_ini : '';
    const fim = ds.hasDateRange==='prop' ? finDateState.prop_fim : ds.hasDateRange==='mens' ? finDateState.mens_fim : '';
    const d = ds.hasDateRange ? ds.data(ini,fim) : ds.data();

    if(d.multiDatasets){
      chartInstances[id]=new Chart(ctx,{type:'bar',data:{labels:d.labels,datasets:d.multiDatasets.map(md=>({label:md.label,data:md.data,backgroundColor:md.color+'aa',borderColor:md.color,borderWidth:1,borderRadius:3}))},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8a96a8',font:{size:10},boxWidth:10}}},scales:{x:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}},y:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}}}}});
    } else {
      chartInstances[id]=new Chart(ctx,{type:ds.type,
        data:{labels:d.labels,datasets:[{data:d.vals,backgroundColor:d.colors.slice(0,d.vals.length).map(c=>c+'cc'),borderColor:d.colors.slice(0,d.vals.length),borderWidth:1,borderRadius:isDonut?0:3,hoverOffset:isDonut?6:0}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:isDonut,position:'right',labels:{color:'#8a96a8',font:{size:10},boxWidth:10}}},
          scales:isDonut?{}:{x:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}},y:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}}}}
      });
    }
  }

  window._finDashChange=function(sel){chartChoices[sel.dataset.chartId]=sel.value;renderChart(sel.dataset.chartId);};
  window._finDateChange=function(id,rk,field,val){finDateState[rk+'_'+field]=val;renderChart(id);};

  document.getElementById('content').innerHTML = `
    <!-- BUDGET SECTION -->
    <div class="budget-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Budget Anual ${anoAtual}</div>
          <div style="font-size:22px;font-weight:700;color:var(--navy)">R$ ${Number(budgetRec.valorBudget).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
        </div>
        <div class="budget-set-form">
          <input type="number" id="budget-input" value="${budgetRec.valorBudget||''}" placeholder="Definir budget anual..." min="0" step="1000" style="width:200px;padding:7px 10px;font-size:13px">
          <button class="btn" id="budget-save" style="padding:7px 14px">Salvar Budget</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">Propostas Aprovadas</div>
          <div style="font-size:18px;font-weight:700;color:var(--navy)">R$ ${totalPropAprov.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
          <div style="font-size:11px;color:var(--text3)">Valor único + Pacotes: R$ ${totalPacotes.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">Mensalidades (×12)</div>
          <div style="font-size:18px;font-weight:700;color:var(--accent2)">R$ ${totalMensAprov.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
          <div style="font-size:11px;color:var(--text3)">Recorrência anualizada</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">Saldo Disponível</div>
          <div style="font-size:18px;font-weight:700;color:${budgetRestante<0?'var(--red)':budgetRestante<budgetRec.valorBudget*0.1?'var(--gold)':'var(--accent2)'}">
            R$ ${budgetRestante.toLocaleString('pt-BR',{minimumFractionDigits:2})}
          </div>
          <div style="font-size:11px;color:var(--text3)">${pctUsado.toFixed(1)}% consumido</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Consumo do Budget (${pctUsado.toFixed(1)}%)</div>
      <div class="budget-bar-wrap"><div class="budget-bar-fill" style="width:${pctUsado}%;background:${barColor}"></div></div>
    </div>

    <!-- METRICS -->
    <div class="metrics" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
      <div class="metric accent"><div class="metric-label">Total Propostas</div><div class="metric-val">${propostas.length}</div><div class="metric-sub">${propostas.filter(p=>p.status==='pendente').length} pendente(s)</div></div>
      <div class="metric green"><div class="metric-label">Valor Aprovado</div><div class="metric-val">R$ ${totalPropAprov.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="metric-sub">${propAnuais.length} proposta(s)</div></div>

pages.dashboard_comercial = async function() {
  updateTopbar('Dashboard Comercial', 'Visão gerencial de clientes, UFs, representantes e grupos', `<button class="btn-report" id="dash-com-report">📄 Gerar Relatório</button>`);
  document.getElementById('content').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text3)"><div class="spinner"></div> Carregando dados...</div>`;

  const [_clientesRaw2, reps, sistemas, _allChamados, _allEnvios] = await Promise.all([
    dbAll('clientes'), dbAll('representantes'), dbAll('sistemas'),
    dbAll('chamados'), dbAll('envios')
  ]);
  // ── RLS: filtrar clientes pelo vínculo do usuário ──
  const clientes = applyDataFilter(_clientesRaw2, reps);

  const repById = {}; for(const r of reps) repById[r.id] = r;
  const sysById = {}; for(const s of sistemas) sysById[s.id] = s;

  // ── Lookup maps O(n) ──
  const _chByC = {};
  for(const ch of _allChamados){
    if(!_chByC[ch.fk_cliente]) _chByC[ch.fk_cliente] = [];
    _chByC[ch.fk_cliente].push(ch);
  }
  const clienteIntStatus = {};
  for(const c of clientes) clienteIntStatus[c.Codigo] = getIntStatus(_chByC[c.Codigo] || []);

  const _evByC = {};
  for(const ev of _allEnvios){
    _evByC[ev.fk_cliente] = (_evByC[ev.fk_cliente]||0) + ev.qntEnvio;
  }

  // ── Aggregation O(n) ──
  const ufCount={}, repCount={}, grupoCount={}, ufFilialCount={};
  const repIntCount={}, repSysCount={}, repEnvioCount={};
  // Heatmap 1: chamados de integração por UF e clientes integrados por UF
  const chamadosByUF={}, clientesIntByUF={};
  // Heatmap 2: Esmeralda/Chivor por UF
  const esmeraldaByUF={}, chivorByUF={};

  for(const c of clientes){
    const rk  = c.fk_representante;
    const uf  = c.UF || '';
    const cod = String(c.Codigo);

    if(uf)    ufCount[uf]        = (ufCount[uf]       ||0) + 1;
    if(rk)    repCount[rk]       = (repCount[rk]      ||0) + 1;
    if(c.Grupo) grupoCount[c.Grupo] = (grupoCount[c.Grupo]||0) + 1;
    if(c.CodMatriz && uf) ufFilialCount[uf] = (ufFilialCount[uf]||0) + 1;

    // Heatmap 1A: chamados de integração por UF
    if(uf && _chByC[cod]) {
      const intChs = _chByC[cod].filter(ch => ch.tipoIntegracao || ch.tipoEnvio);
      if(intChs.length) chamadosByUF[uf] = (chamadosByUF[uf]||0) + intChs.length;
    }
    // Heatmap 1B: clientes integrados ativos por UF
    if(uf && clienteIntStatus[cod] === 'active')
      clientesIntByUF[uf] = (clientesIntByUF[uf]||0) + 1;

    // Heatmap 2: categorias especiais por UF
    if(uf && c.categoria_especial === 'Esmeralda') esmeraldaByUF[uf] = (esmeraldaByUF[uf]||0) + 1;
    if(uf && c.categoria_especial === 'Chivor')    chivorByUF[uf]    = (chivorByUF[uf]   ||0) + 1;

    if(rk){
      if(clienteIntStatus[cod] === 'active') repIntCount[rk] = (repIntCount[rk]||0) + 1;
      if(c.fk_sistema){
        if(!repSysCount[rk]) repSysCount[rk] = {};
        const sn = sysById[c.fk_sistema]?.nome || '?';
        repSysCount[rk][sn] = (repSysCount[rk][sn]||0) + 1;
      }
      repEnvioCount[rk] = (repEnvioCount[rk]||0) + (_evByC[cod]||0);
    }
  }

  };

  const CENTROIDS = {
    AM:[88,149],PA:[215,128],MT:[194,278],BA:[355,238],MG:[318,308],
    GO:[278,268],MS:[208,368],SP:[273,388],PR:[250,432],RS:[236,508],
    MA:[318,146],PI:[346,166],TO:[268,183],CE:[396,156],RO:[133,226],
    RR:[146,68],AC:[40,208],AP:[235,38],RN:[422,150],PE:[390,198],
    PB:[416,191],AL:[413,216],SE:[406,229],ES:[380,314],RJ:[350,386],
    SC:[253,460],DF:[289,296],
  };

  // ── Interpolação de cor (gamma .5 = melhor spread perceptual) ──
  function lerpColor(hexA, hexB, t) {
    t = Math.pow(Math.max(0, Math.min(1, t)), 0.5);
    const p = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    const [ar,ag,ab] = p(hexA), [br,bg,bb] = p(hexB);
    return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
  }

  // ── Tooltip compartilhado (multi-métrica) ──
  const _hmTT = document.getElementById('hm-tooltip-shared');

  function showHMTooltip(e, uf, name) {
    if (!_hmTT) return;
    const ch  = _hmChamadosByUF[uf]    || 0;
    const int = _hmClientesIntByUF[uf] || 0;
    const esm = _hmEsmeraldaByUF[uf]   || 0;
    const chv = _hmChivorByUF[uf]      || 0;
    const tot = _hmUfCount[uf]          || 0;

    _hmTT.innerHTML = `
      <div style="font-weight:700;font-size:13px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:5px">${name} <span style="font-size:10px;opacity:.6;font-weight:400">${uf}</span></div>
      <div style="display:grid;grid-template-columns:auto auto;gap:2px 14px">
        <span style="opacity:.7">Clientes totais</span>    <span style="font-weight:700;text-align:right">${tot.toLocaleString('pt-BR')}</span>
        <span style="opacity:.7">Chamados integ.</span>    <span style="font-weight:700;text-align:right;color:#93c5fd">${ch.toLocaleString('pt-BR')}</span>
        <span style="opacity:.7">Integrados ativos</span> <span style="font-weight:700;text-align:right;color:#6ee7b7">${int.toLocaleString('pt-BR')}</span>
        ${esm>0||chv>0 ? `<span style="opacity:.7">💎 Esmeralda</span>   <span style="font-weight:700;text-align:right;color:#5eead4">${esm.toLocaleString('pt-BR')}</span>
        <span style="opacity:.7">💜 Chivor</span>         <span style="font-weight:700;text-align:right;color:#c4b5fd">${chv.toLocaleString('pt-BR')}</span>` : ''}
      </div>`;
    _hmTT.style.display = 'block';
    moveHMTooltip(e);
  }

  function moveHMTooltip(e) {
    if (!_hmTT) return;
    const vw = window.innerWidth, vh = window.innerHeight;
    const tw = _hmTT.offsetWidth  || 200;
    const th = _hmTT.offsetHeight || 120;
    let lx = e.clientX + 16, ly = e.clientY - 20;
    if (lx + tw > vw - 8)  lx = e.clientX - tw - 10;
    if (ly + th > vh - 8)  ly = e.clientY - th - 10;
    if (ly < 8) ly = 8;
    _hmTT.style.left = lx + 'px';
    _hmTT.style.top  = ly + 'px';
  }

  function hideHMTooltip() { if (_hmTT) _hmTT.style.display = 'none'; }

  // ── Dados reativs ao período (recalculados ao filtrar) ──
  let _hmChamadosByUF    = { ...chamadosByUF };
  let _hmClientesIntByUF = { ...clientesIntByUF };
  let _hmEsmeraldaByUF   = { ...esmeraldaByUF };
  let _hmChivorByUF      = { ...chivorByUF };
  let _hmUfCount         = { ...ufCount };

  // ── Recalcula chamados por UF filtrado por período ──
  function recalcHMData(dtIni, dtFim) {
    const newCh = {}, newInt = {};
    // Clientes totais e integrados nunca mudam por período (são estados do cadastro)
    // Apenas chamados são filtrados por dataSolicitacao
    for (const c of clientes) {
      const uf  = c.UF || '';
      const cod = String(c.Codigo);
      if (!uf) continue;
      newInt[uf] = newInt[uf] || 0;
      if (clienteIntStatus[cod] === 'active') newInt[uf]++;

      const chs = _chByC[cod] || [];
      for (const ch of chs) {
        if (!ch.tipoIntegracao && !ch.tipoEnvio) continue;
        // Filtro de período por dataSolicitacao
        if (dtIni || dtFim) {
          const ds = (ch.dataSolicitacao || '').slice(0,10);
          if (!ds) continue;
          if (dtIni && ds < dtIni) continue;
          if (dtFim && ds > dtFim) continue;
        }
        newCh[uf] = (newCh[uf] || 0) + 1;
      }
    }
    _hmChamadosByUF    = newCh;
    _hmClientesIntByUF = newInt;
    // Esmeralda/Chivor são atributos do cliente — não filtram por período
    _hmEsmeraldaByUF   = { ...esmeraldaByUF };
    _hmChivorByUF      = { ...chivorByUF };
    _hmUfCount         = { ...ufCount };
  }

  // ── drawHeatmap: desenha um SVG com paths coloridos por dataMap ──
  function drawHeatmap(svgId, gradId, maxId, dataMap, colorLow, colorHigh, unitLabel) {
    const svg = document.getElementById(svgId);
    if (!svg) return;
    const vals = Object.values(dataMap).filter(v => v > 0);
    const maxV = vals.length ? Math.max(...vals) : 1;

    // Legenda
    const grad  = document.getElementById(gradId);
    const maxEl = document.getElementById(maxId);
    if (grad)  grad.style.background = `linear-gradient(to right,${colorLow},${colorHigh})`;
    if (maxEl) maxEl.textContent = maxV.toLocaleString('pt-BR') + ' ' + unitLabel;

    // Paths
    const pathsSVG = Object.entries(BR).map(([uf, {n, d}]) => {
      const val    = dataMap[uf] || 0;
      const fill   = val === 0 ? '#e8edf3' : lerpColor(colorLow, colorHigh, val / maxV);
      const isZero = val === 0;
      return `<path id="hm-path-${svgId}-${uf}"
        data-uf="${uf}" data-name="${n}"
        d="${d}" fill="${fill}" stroke="#fff" stroke-width="${isZero?'.8':'1.1'}"
        style="cursor:${isZero?'default':'pointer'};transition:filter .12s,fill .25s"
        class="hm-path"/>`;
    }).join('');

    // Labels de UF
    const labelsSVG = Object.entries(CENTROIDS).map(([uf, [x, y]]) => {
      const val  = dataMap[uf] || 0;
      const t    = maxV > 0 ? val / maxV : 0;
      const col  = (t > 0.45) ? '#ffffff' : '#3d4a5c';
      return `<text x="${x}" y="${y}" font-size="7" font-family="system-ui,sans-serif"
        font-weight="700" text-anchor="middle" fill="${col}" pointer-events="none"
        style="user-select:none">${uf}</text>`;
    }).join('');

    svg.innerHTML = pathsSVG + labelsSVG;

    // Eventos do tooltip compartilhado
    svg.querySelectorAll('.hm-path').forEach(path => {
      path.addEventListener('mouseenter', e => {
        path.style.filter = 'brightness(1.14) drop-shadow(0 1px 4px rgba(0,0,0,.3))';
        showHMTooltip(e, path.dataset.uf, path.dataset.name);
      });
      path.addEventListener('mousemove', moveHMTooltip);
      path.addEventListener('mouseleave', () => {
        path.style.filter = '';
        hideHMTooltip();
      });
    });
  }

  // ── Estado dos toggles ──
  let hm1Mode = 'chamados', hm2Mode = 'esmeralda';

  function applyBtnState(btns, activeKey) {
    Object.entries(btns).forEach(([k, {el, on, off, onTxt, offTxt, border}]) => {
      const btn = document.getElementById(el); if (!btn) return;
      const isOn = k === activeKey;
      btn.style.background  = isOn ? on : off;
      btn.style.color       = isOn ? onTxt : offTxt;
      btn.style.borderColor = isOn ? border : 'var(--border)';
    });
  }

  const HM1_BTNS = {
    chamados:   {el:'hm1-btn-ch',  on:'var(--navy)', off:'var(--bg2)', onTxt:'#fff', offTxt:'var(--text2)', border:'var(--navy)'},
    integrados: {el:'hm1-btn-int', on:'var(--navy)', off:'var(--bg2)', onTxt:'#fff', offTxt:'var(--text2)', border:'var(--navy)'},
  };
  const HM2_BTNS = {
    esmeralda: {el:'hm2-btn-esm', on:'var(--accent2)', off:'var(--bg2)', onTxt:'#fff', offTxt:'var(--text2)', border:'var(--accent2)'},
    chivor:    {el:'hm2-btn-chiv',on:'#6c5ce7',        off:'var(--bg2)', onTxt:'#fff', offTxt:'var(--text2)', border:'#6c5ce7'},
  };

  function paintHM1() {
    const data  = hm1Mode === 'chamados' ? _hmChamadosByUF : _hmClientesIntByUF;
    const label = hm1Mode === 'chamados' ? 'chamados' : 'integrados';
    drawHeatmap('hm-svg-1', 'hm1-grad', 'hm1-max', data, '#dbeafe', '#003761', label);
    applyBtnState(HM1_BTNS, hm1Mode);
  }

  function paintHM2() {
    const data    = hm2Mode === 'esmeralda' ? _hmEsmeraldaByUF : _hmChivorByUF;
    const label   = hm2Mode === 'esmeralda' ? 'Esmeralda' : 'Chivor';
    const hiColor = hm2Mode === 'esmeralda' ? '#0F9B94' : '#6c5ce7';
    const loColor = hm2Mode === 'esmeralda' ? '#ccfaf8' : '#ede9fe';
    drawHeatmap('hm-svg-2', 'hm2-grad', 'hm2-max', data, loColor, hiColor, label);
    applyBtnState(HM2_BTNS, hm2Mode);
  }

  function repaintAll() { paintHM1(); paintHM2(); }

  window._hm1Switch = function(mode) { hm1Mode = mode; paintHM1(); };
  window._hm2Switch = function(mode) { hm2Mode = mode; paintHM2(); };

  // ── Filtro de Período ──
  function applyPeriodFilter() {
    const dtIni = document.getElementById('hm-dt-ini')?.value || '';
    const dtFim = document.getElementById('hm-dt-fim')?.value || '';
    recalcHMData(dtIni, dtFim);
    repaintAll();
    // Label visual
    const lbl = document.getElementById('hm-period-label');
    if (lbl) {
      if (dtIni || dtFim) {
        const fmt = d => d ? d.split('-').reverse().join('/') : '…';
        lbl.textContent = `Exibindo: ${fmt(dtIni)} → ${fmt(dtFim)}`;
      } else {
        lbl.textContent = '';
      }
    }
  }

  document.getElementById('hm-filter-btn')?.addEventListener('click', applyPeriodFilter);
  document.getElementById('hm-dt-fim')?.addEventListener('change', e => {
    const ini = document.getElementById('hm-dt-ini')?.value;
    if (ini && e.target.value) applyPeriodFilter(); // auto-apply when both dates set
  });
  document.getElementById('hm-clear-btn')?.addEventListener('click', () => {
    const ini = document.getElementById('hm-dt-ini');
    const fim = document.getElementById('hm-dt-fim');
    if (ini) ini.value = '';
    if (fim) fim.value = '';
    recalcHMData('', ''); // reset to full dataset
    repaintAll();
    const lbl = document.getElementById('hm-period-label');
    if (lbl) lbl.textContent = '';
  });

  // Render inicial
  repaintAll();

  document.getElementById('dash-com-report')?.addEventListener('click', ()=>{
    const ufRows  = Object.entries(ufCount).sort((a,b)=>b[1]-a[1]).map(([uf,n])=>[uf, n, `${((n/clientes.length)*100).toFixed(1)}%`]);
    const repRows = Object.entries(repCount).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([id,n])=>[(repById[id]?.nome||id),n]);
    const grRows  = Object.entries(grupoCount).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([g,n])=>[g,n]);
    const hmRows  = Object.entries(chamadosByUF).sort((a,b)=>b[1]-a[1]).map(([uf,n])=>[uf,n,(esmeraldaByUF[uf]||0),(chivorByUF[uf]||0)]);
    generateReport('Dashboard Comercial','Relatório Comercial',[
      {heading:'Clientes por UF',headers:['UF','Total','%'],rows:ufRows},
      {heading:'Clientes por Representante',headers:['Representante','Total'],rows:repRows},
      {heading:'Top Grupos',headers:['Grupo','Total'],rows:grRows},
      {heading:'Distribuição Geográfica (Chamados/Esmeralda/Chivor)',headers:['UF','Chamados Int.','Esmeralda','Chivor'],rows:hmRows},
      {heading:'Resumo',headers:['Indicador','Valor'],rows:[
        ['Total Clientes',clientes.length],['Matrizes',totalMatrizes],['Filiais',totalFiliais],
        ['Grupos',Object.keys(grupoCount).length],
        ['Esmeralda',Object.values(esmeraldaByUF).reduce((s,v)=>s+v,0)],
        ['Chivor',Object.values(chivorByUF).reduce((s,v)=>s+v,0)]
      ]}
    ]);
  });
};

// ===================== PAGE: GRUPOS E MATRIZES =====================
pages.grupos_matrizes = async function() {
  updateTopbar('Grupos e Matrizes', 'Consulta por grupo, matriz e filiais vinculadas', '');

  const [clientes, reps, sistemas] = await Promise.all([dbAll('clientes'), dbAll('representantes'), dbAll('sistemas')]);
  const repById = {}; for(const r of reps) repById[r.id] = r;
  const sysById = {}; for(const s of sistemas) sysById[s.id] = s;

  let gmSearch = '', gmGrupo = '', gmTab = 'grupos'; // 'grupos' or 'matrizes'

  // Build grupos: aggregate all labs with same Grupo
  const gruposMap = {};
  for (const c of clientes) {
    const g = c.Grupo || '(Sem Grupo)';
    if (!gruposMap[g]) gruposMap[g] = [];
    gruposMap[g].push(c);
  }

  // Build matrizes: only labs without CodMatriz; attach their filiais
  const matrizMap = {};
  const matrizClientes = clientes.filter(c => !c.CodMatriz);
  for (const m of matrizClientes) matrizMap[m.Codigo] = { matriz: m, filiais: [] };
  for (const f of clientes.filter(c => c.CodMatriz)) {
    if (matrizMap[f.CodMatriz]) matrizMap[f.CodMatriz].filiais.push(f);
  }

  const allGrupos  = Object.keys(gruposMap).sort();
  const allMatrizes = matrizClientes.map(m=>m.Codigo);

  function renderGrupos() {
    let filtered = allGrupos.filter(g => {
      if (gmGrupo && g !== gmGrupo) return false;
      if (gmSearch) {
        const labs = gruposMap[g];
        return g.toLowerCase().includes(gmSearch.toLowerCase()) ||
          labs.some(c => (c.NomeFantasia||c.RazaoSocial||'').toLowerCase().includes(gmSearch.toLowerCase()) || String(c.Codigo).includes(gmSearch));
      }
      return true;
    });
    const tbody = document.getElementById('gm-body');
    if (!tbody) return;
    if (!filtered.length) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text3)">Nenhum grupo encontrado.</td></tr>`; return; }
    tbody.innerHTML = filtered.map(g => {
      const labs = gruposMap[g];
      const ufs  = [...new Set(labs.map(c=>c.UF).filter(Boolean))].sort().join(', ');
      const repIds = [...new Set(labs.map(c=>c.fk_representante).filter(Boolean))];
      const repNomes = repIds.slice(0,3).map(id=>repById[id]?.nome?.split(' ')[0]||id).join(', ') + (repIds.length>3?` +${repIds.length-3}`:'');
      const sysIds = [...new Set(labs.map(c=>c.fk_sistema).filter(Boolean))];
      const sysNomes = sysIds.slice(0,3).map(id=>sysById[id]?.nome||id).join(', ') + (sysIds.length>3?` +${sysIds.length-3}`:'');
      return `<tr>
        <td><strong style="color:var(--navy)">${g}</strong></td>
        <td style="text-align:center"><span class="badge rep">${labs.length}</span></td>
        <td style="font-size:11px;color:var(--text2)">${ufs||'—'}</td>
        <td style="font-size:11px;color:var(--text2)">${repNomes||'—'}</td>
        <td style="font-size:11px">${sysNomes ? `<span class="badge sys" style="font-size:10px">${sysNomes}</span>` : '—'}</td>
        <td><button class="btn sm secondary" style="font-size:11px;padding:3px 8px" onclick="toggleGrupoDetail('${encodeURIComponent(g)}')">Ver labs</button></td>
      </tr>
      <tr id="gd-${encodeURIComponent(g)}" style="display:none;background:var(--bg3)">
        <td colspan="6" style="padding:8px 16px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Laboratórios do grupo:</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${labs.map(c=>`<span style="background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--navy);font-family:var(--mono)">${c.Codigo} — ${c.NomeFantasia||c.RazaoSocial}</span>`).join('')}
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function renderMatrizes() {
    const entries = Object.values(matrizMap).filter(({matriz, filiais}) => {
      if (!gmSearch) return true;
      return String(matriz.Codigo).includes(gmSearch) ||
        (matriz.NomeFantasia||matriz.RazaoSocial||'').toLowerCase().includes(gmSearch.toLowerCase()) ||
        filiais.some(f=>(f.NomeFantasia||f.RazaoSocial||'').toLowerCase().includes(gmSearch.toLowerCase()));
    }).sort((a,b)=>Number(a.matriz.Codigo)-Number(b.matriz.Codigo));

    const tbody = document.getElementById('gm-body');
    if (!tbody) return;
    if (!entries.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text3)">Nenhuma matriz encontrada.</td></tr>`; return; }
    tbody.innerHTML = entries.map(({matriz:m, filiais}) => {
      const rep = repById[m.fk_representante];
      const sys = sysById[m.fk_sistema];
      return `<tr>
        <td><strong style="font-family:var(--mono);color:var(--text3)">${m.Codigo}</strong></td>
        <td><strong style="color:var(--navy)">${m.NomeFantasia||m.RazaoSocial||'—'}</strong><div style="font-size:10px;color:var(--text3)">${m.CNPJ||''}</div></td>
        <td><span class="badge uf">${m.UF||'?'}</span></td>
        <td style="font-size:12px">${rep?.nome||'—'}</td>
        <td>${sys?`<span class="badge sys" style="font-size:10px">${sys.nome}</span>`:'—'}</td>
        <td style="text-align:center"><span class="badge rep">${filiais.length}</span></td>

  renderTable();

  document.getElementById('gm-search').addEventListener('input', e => { gmSearch=e.target.value; renderTable(); });
  document.getElementById('tab-grupos').addEventListener('click', () => { gmTab='grupos'; pages.grupos_matrizes(); });
  document.getElementById('tab-matrizes').addEventListener('click', () => { gmTab='matrizes'; pages.grupos_matrizes(); });
  document.getElementById('gm-grupo-filter')?.addEventListener('change', e => { gmGrupo=e.target.value; renderTable(); });

  window.toggleGrupoDetail = (g) => {
    const row = document.getElementById(`gd-${g}`);
    if (row) row.style.display = row.style.display==='none'?'table-row':'none';

  window.toggleMatrizDetail = (cod) => {

// ACL Configuration — defines all controllable pages and their buttons
const ACL_STRUCTURE = [
  { cat:'Visão Geral', pages:[
    { key:'dashboard',           label:'Dashboard Integração',  btns:[{key:'dash-int-report',label:'Gerar Relatório'}] },
    { key:'dashboard_comercial', label:'Dashboard Comercial',   btns:[{key:'dash-com-report',label:'Gerar Relatório'}] },
    { key:'dashboard_financeiro',label:'Dashboard Financeiro',  btns:[{key:'dash-fin-report',label:'Gerar Relatório'},{key:'budget-save',label:'Salvar Budget'}] },
  ]},
  { cat:'Cadastros', pages:[
    { key:'laboratorios',   label:'Laboratórios',     btns:[{key:'edit-btn',label:'Botão Editar'}] },
    { key:'representantes', label:'Representantes',   btns:[{key:'new-rep-btn',label:'Novo Representante'},{key:'edit-btn',label:'Botão Editar'}] },
    { key:'supervisores',   label:'Supervisores',     btns:[{key:'new-sup-btn',label:'Novo Supervisor'},{key:'edit-btn',label:'Botão Editar'}] },
    { key:'assessores',     label:'Assessores',       btns:[{key:'edit-btn',label:'Botão Editar'}] },
    { key:'analistas',      label:'Analistas',        btns:[{key:'new-ana-btn',label:'Novo Analista'},{key:'edit-btn',label:'Botão Editar'}] },
    { key:'sistemas',       label:'Sistemas',         btns:[{key:'new-sys-btn',label:'Novo Sistema'},{key:'edit-btn',label:'Botão Editar'}] },
    { key:'grupos_matrizes',label:'Grupos e Matrizes',btns:[{key:'edit-btn',label:'Botão Editar'}] },
  ]},
  { cat:'Análise', pages:[
    { key:'divergencias', label:'Divergências', btns:[] },
  ]},
  { cat:'Financeiro', pages:[
    { key:'propostas', label:'Propostas', btns:[{key:'new-prop-btn',label:'Nova Proposta'},{key:'edit-btn',label:'Botão Editar'}] },
    { key:'pacotes',   label:'Pacotes',   btns:[{key:'new-pac-btn',label:'Novo Pacote'},{key:'edit-btn',label:'Botão Editar'}] },
  ]},
  { cat:'Operações', pages:[
    { key:'importacao',     label:'Importação',                  btns:[{key:'clear-data-btn',label:'Limpar Dados'}] },
    { key:'perfis_acesso',  label:'Perfis de acesso e usuários', btns:[] },
  ]},
];

const PERFIS_DEFAULT = [
  { id:'supervisor',       nome:'Supervisor',      fullAccess: true  },
  { id:'representante',    nome:'Representante',   fullAccess: false },
  { id:'analistas',        nome:'Analistas',       fullAccess: false },
  { id:'analistas_senior', nome:'Analistas Sênior',fullAccess: false },
  { id:'estagiario',       nome:'Estagiário',      fullAccess: false },
  { id:'financeiro',       nome:'Financeiro',      fullAccess: false },
];

function buildDefaultPerms() {
  const p = {};
  for(const cat of ACL_STRUCTURE)
    for(const pg of cat.pages){
      p[pg.key] = true;
      for(const btn of pg.btns) p[`${pg.key}::${btn.key}`] = true;
    }
  return p;
}

pages.perfis_acesso = async function() {
  updateTopbar('Perfis de acesso e usuários', 'Gerencie permissões por perfil', '');

  // Load or seed default perfis
  let perfis = await dbAll('perfis_acesso');
  if(perfis.length === 0) {
    for(const p of PERFIS_DEFAULT){
      await dbPut('perfis_acesso', { ...p, permissoes: buildDefaultPerms() });
    }
    perfis = await dbAll('perfis_acesso');
  }

  let selectedId = perfis[0]?.id || 'supervisor';

  function renderSidebar() {
    return perfis.map(p => `
      <div class="acl-perfil-item ${p.id===selectedId?'selected':''}" data-pid="${p.id}">
        <div>
          <div class="acl-perfil-nome">${p.nome}</div>
          <div class="acl-perfil-tipo">${p.fullAccess?'Acesso Total':'Acesso Personalizado'}</div>
        </div>
        ${p.fullAccess ? '<span class="acl-full-badge">✓ TOTAL</span>' : ''}
      </div>`).join('');
  }

  function isSupervisor(pid) { return perfis.find(p=>p.id===pid)?.fullAccess === true; }

  function renderMatrix(perfil) {
    if(!perfil) return '';
    const perms = perfil.permissoes || {};
    const isSuper = perfil.fullAccess;

    const rows = ACL_STRUCTURE.map(cat => {
      const catPages = cat.pages;
      const allCatEnabled = catPages.every(pg => isSuper || perms[pg.key] !== false);

      const pageRows = catPages.map(pg => {
        const pgEnabled = isSuper || perms[pg.key] !== false;

        const btnRows = pg.btns.map(btn => {
          const btnKey = `${pg.key}::${btn.key}`;
          const btnEnabled = isSuper || perms[btnKey] !== false;
          return `<div class="acl-btn-row">
            <span class="acl-btn-label">🔲 Botão: ${btn.label}</span>
            <label class="acl-toggle">
              <input type="checkbox" ${btnEnabled?'checked':''} ${isSuper?'disabled':''}
                data-perm="${btnKey}" onchange="window._aclToggle(this)">
              <span class="acl-toggle-slider"></span>
            </label>
          </div>`;
        }).join('');

        return `<div class="acl-page-row">
          <span class="acl-page-label">📄 ${pg.label}${pg.btns.length?`<small>(${pg.btns.length} botão/ões)</small>`:''}</span>
          <label class="acl-toggle">
            <input type="checkbox" ${pgEnabled?'checked':''} ${isSuper?'disabled':''}
              data-perm="${pg.key}" onchange="window._aclToggle(this)">
            <span class="acl-toggle-slider"></span>
          </label>
        </div>${btnRows}`;
      }).join('');

      return `<div class="acl-category">
        <div class="acl-cat-header">
          <span class="acl-cat-label">📁 ${cat.cat}</span>
          ${isSuper ? '<span style="font-size:10px;color:rgba(15,155,148,.8);font-weight:600">Acesso Total</span>' : ''}
        </div>
        ${pageRows}
      </div>`;
    }).join('');

    return `<div class="acl-matrix">
      <div class="acl-matrix-header">
        <div>
          <div class="acl-matrix-title">${perfil.nome}</div>
          <div class="acl-matrix-sub">${isSuper?'Acesso completo a todas as funcionalidades':'Defina as permissões abaixo'}</div>
        </div>
        ${isSuper ? '' : `<button class="btn secondary" style="font-size:12px;padding:5px 12px" onclick="window._aclResetPerfil()">↺ Redefinir para Total</button>`}
      </div>
      <div style="max-height:600px;overflow-y:auto">${rows}</div>
    </div>`;
  }

  function renderPage() {
    const perfil = perfis.find(p=>p.id===selectedId);
    document.getElementById('acl-sidebar-list').innerHTML = renderSidebar();
    document.getElementById('acl-matrix-wrap').innerHTML = renderMatrix(perfil);

    // Rebind sidebar clicks
    document.querySelectorAll('[data-pid]').forEach(el => {
      el.addEventListener('click', () => {
        selectedId = el.dataset.pid;
        renderPage();
      });
    });
  }

  const isAdminUser = currentUser?.isAdmin || false;

  document.getElementById('content').innerHTML = `
    <!-- Permissions Matrix -->
    <div class="acl-grid" style="margin-bottom:24px">
      <div>
        <div class="acl-sidebar">
          <div class="acl-sidebar-header">Perfis Disponíveis</div>
          <div id="acl-sidebar-list"></div>
        </div>
        <div style="margin-top:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);font-size:11px;color:var(--text3);line-height:1.8">
          <strong style="color:var(--navy)">Como funciona:</strong><br>
          ✓ <strong>Supervisor</strong> tem acesso total (imutável)<br>
          ✓ Ative ou desative páginas e botões por perfil<br>
          ✓ Desativar uma página oculta ela do menu<br>
          ✓ As configurações são salvas automaticamente
        </div>
      </div>
      <div id="acl-matrix-wrap"></div>
    </div>

    <!-- User Management (admin only) -->
    ${isAdminUser ? `
    <div class="chart-card" style="margin-bottom:24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="chart-title" style="margin:0">Usuários do Sistema</div>
        <button class="btn" id="new-user-btn" style="font-size:12px;padding:6px 14px">+ Novo Usuário</button>
      </div>
      <div id="users-list"></div>
    </div>` : ''}

    <!-- Audit Log -->
    <div class="chart-card">
      <div class="chart-title" style="margin-bottom:12px">Log de Auditoria</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Registro de todas as ações realizadas no sistema</div>
      <div style="max-height:400px;overflow-y:auto">
        <div class="audit-row" style="background:var(--navy);color:rgba(255,255,255,.7);font-weight:700;border-radius:var(--r) var(--r) 0 0">
          <span>Data / Hora</span><span>Usuário</span><span>Descrição</span><span>Ação</span>
        </div>
        <div id="audit-log-list"><div style="text-align:center;padding:30px;color:var(--text3)">Carregando...</div></div>
      </div>
    </div>
  `;

  renderPage();

  // ---- LOAD USERS ----
  async function loadUsers() {
    const ul = document.getElementById('users-list');
    if(!ul) return;
    const users = await dbAll('usuarios');
    ul.innerHTML = users.length === 0
      ? `<div style="color:var(--text3);font-size:12px;padding:10px">Nenhum usuário cadastrado.</div>`
      : `<table style="width:100%;font-size:12px"><thead><tr>
          <th>Login</th><th>Nome</th><th>Perfil</th><th>Admin</th><th>Vínculo RLS</th><th></th>
        </tr></thead><tbody>
          ${users.map(u=>{
            const rlsLabel = u.entityType
              ? `<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(15,155,148,.1);color:var(--accent2);border:1px solid rgba(15,155,148,.25)">${u.entityType}: ${u.entityNome||u.entityId||'?'}</span>`
              : `<span style="font-size:10px;color:var(--text3)">Global</span>`;
            return `<tr>
              <td style="font-family:var(--mono);color:var(--text3)">${u.login}</td>
              <td style="font-weight:600;color:var(--navy)">${u.nome||'—'}</td>
              <td><span class="badge tag">${u.perfilNome||u.perfilId}</span></td>
              <td style="text-align:center">${u.isAdmin?'<span style="color:var(--accent2);font-weight:700">✓</span>':'—'}</td>
              <td>${rlsLabel}</td>
              <td style="white-space:nowrap">
                <div style="display:flex;gap:5px">
                  ${u.login!=='admin'?`<button class="btn sm secondary" data-edit-user="${u.login}">Editar</button>
                  <button class="btn sm danger" data-del-user="${u.login}">×</button>`:'<span style="font-size:11px;color:var(--text3)">Protegido</span>'}
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody></table>`;

    ul.querySelectorAll('[data-edit-user]').forEach(btn => {
      btn.addEventListener('click', () => openUserModal(btn.dataset.editUser, perfis, loadUsers));
    });
    ul.querySelectorAll('[data-del-user]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if(!confirm(`Excluir usuário "${btn.dataset.delUser}"?`)) return;
        await dbDeleteLogged('usuarios', btn.dataset.delUser, `Excluiu usuário ${btn.dataset.delUser}`);
        toast('Usuário excluído.','info'); loadUsers();
      });
    });
  }

  // ---- LOAD AUDIT LOG ----
  async function loadAuditLog() {
    const el = document.getElementById('audit-log-list');
    if(!el) return;
    const logs = (await dbAll('audit_log')).reverse().slice(0,200);
    if(!logs.length){ el.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text3)">Nenhuma ação registrada ainda.</div>`; return; }
    const actionClass = a => {
      if(a==='login'||a==='logout') return 'login';
      if(a.includes('Excluiu')||a.includes('excluiu')) return 'delete';
      if(a.includes('Criou')||a.includes('criou')||a.includes('import')) return 'create';
      return 'edit';
    };
    el.innerHTML = logs.map(l=>{
      const dt = new Date(l.ts);
      const dateFmt = dt.toLocaleDateString('pt-BR');
      const timeFmt = dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const cls = actionClass(l.acao);
      return `<div class="audit-row">
        <span style="color:var(--text3)">${dateFmt} ${timeFmt}</span>
        <span style="font-weight:600;color:var(--navy)">${l.usuario}</span>
        <span style="color:var(--text2)">${l.detalhe||'—'}</span>
        <span><span class="audit-action-badge ${cls}">${l.acao}</span></span>
      </div>`;
    }).join('');
  }

  if(isAdminUser) {
    loadUsers();
    document.getElementById('new-user-btn')?.addEventListener('click', () => openUserModal(null, perfis, loadUsers));
  }
  loadAuditLog();

  // Toggle handler — saves immediately
  window._aclToggle = async function(checkbox) {
    const perfil = perfis.find(p=>p.id===selectedId);
    if(!perfil || perfil.fullAccess) return;
    const key = checkbox.dataset.perm;
    const val = checkbox.checked;
    if(!perfil.permissoes) perfil.permissoes = buildDefaultPerms();
    perfil.permissoes[key] = val;
    // If a page is disabled, also disable all its buttons
    if(!val && !key.includes('::')) {
      const pg = ACL_STRUCTURE.flatMap(c=>c.pages).find(p=>p.key===key);
      if(pg) for(const btn of pg.btns) perfil.permissoes[`${key}::${btn.key}`] = false;
    }
    await dbPut('perfis_acesso', perfil);
    await auditLog('Editou permissão', `Perfil ${perfil.nome}: ${key}=${val}`);
    toast('Permissão atualizada.','success', 1500);
    // Re-render matrix only (not full page)
    document.getElementById('acl-matrix-wrap').innerHTML = renderMatrix(perfil);
  };

  window._aclResetPerfil = async function() {
    const perfil = perfis.find(p=>p.id===selectedId);
    if(!perfil) return;
    if(!confirm(`Redefinir todas as permissões de "${perfil.nome}" para acesso total?`)) return;
    perfil.permissoes = buildDefaultPerms();
    await dbPut('perfis_acesso', perfil);
    toast('Permissões redefinidas.','success');
    renderPage();
  };
};

// ===================== USER MODAL =====================
async function openUserModal(login, perfis, refresh) {
  // ── BUG FIX: nunca chamar dbGet com null — causa DataError no IndexedDB ──
  let user = null;
  const isNew = !login;
  if (!isNew) {
    try { user = await dbGet('usuarios', login); } catch(e) { user = null; }
  }
  if (!user) {
    user = { login:'', nome:'', senha:'', perfilId:'analistas', perfilNome:'Analistas', isAdmin:false,
             entityType:'', entityId:'', entityNome:'' };
  }

  // Carregar entidades para o dropdown de vínculo (Task 5)
  const [reps, supervisores, assessores] = await Promise.all([
    dbAll('representantes'), dbAll('supervisores'), dbAll('assessores')
  ]);

  function buildEntityOptions(type) {
    if (type === 'representante') return reps.map(r=>`<option value="${r.id}" data-nome="${r.nome}" ${String(r.id)===String(user.entityId)?'selected':''}>${r.nome}</option>`).join('');
    if (type === 'supervisor')    return supervisores.map(s=>`<option value="${s.id}" data-nome="${s.nome}" ${String(s.id)===String(user.entityId)?'selected':''}>${s.nome}</option>`).join('');
    if (type === 'assessor')      return assessores.map(a=>`<option value="${a.id}" data-nome="${a.nome}" ${String(a.id)===String(user.entityId)?'selected':''}>${a.nome}</option>`).join('');
    return '';
  }

  const overlay = openModal(`
    <div class="modal-header">
      <div class="modal-title">${isNew?'Novo Usuário':'Editar Usuário'}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="two-col">
        <div class="field-group">
          <div class="field-label">Login *</div>
          <input type="text" id="u-login" value="${user.login}" ${!isNew?'readonly style="opacity:.6"':''} placeholder="login único">
        </div>
        <div class="field-group">
          <div class="field-label">Nome completo *</div>
          <input type="text" id="u-nome" value="${user.nome||''}" placeholder="Nome do usuário">
        </div>
      </div>
      <div class="two-col">
        <div class="field-group">
          <div class="field-label">Senha ${!isNew?'(deixe em branco para manter)':' *'}</div>
          <input type="password" id="u-senha" placeholder="••••••••">
        </div>
        <div class="field-group">
          <div class="field-label">Perfil *</div>
          <select id="u-perfil">
            ${perfis.map(p=>`<option value="${p.id}" data-nome="${p.nome}" ${p.id===user.perfilId?'selected':''}>${p.nome}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="u-admin" ${user.isAdmin?'checked':''}>
        <label for="u-admin" style="font-size:13px;cursor:pointer">Administrador (pode criar e editar usuários)</label>
      </div>

      <!-- ── Task 5: Vínculo de Entidade (RLS) ── -->
      <div style="margin-top:14px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r)">
        <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">
          🔗 Vincular a Entidade (Isolamento de Dados)
        </div>
        <div class="two-col" style="margin-bottom:8px">
          <div class="field-group" style="margin:0">
            <div class="field-label">Tipo de Entidade</div>
            <select id="u-entity-type">
              <option value="" ${!user.entityType?'selected':''}>— Sem vínculo (Acesso Global) —</option>
              <option value="representante" ${user.entityType==='representante'?'selected':''}>Representante</option>
              <option value="supervisor"    ${user.entityType==='supervisor'?'selected':''}>Supervisor</option>
              <option value="assessor"      ${user.entityType==='assessor'?'selected':''}>Assessor</option>
            </select>
          </div>
          <div class="field-group" style="margin:0" id="u-entity-wrap" ${!user.entityType?'style="display:none"':''}>
            <div class="field-label">Entidade Vinculada</div>
            <select id="u-entity-id">
              <option value="">— Selecione —</option>
              ${buildEntityOptions(user.entityType)}
            </select>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text3)">
          ⚠ Usuário vinculado verá apenas dados da entidade selecionada em todos os dashboards e listagens.
          Perfis com <strong>Acesso Total</strong> ignoram este vínculo.
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn" id="save-user">Salvar</button>
    </div>
  `);

  // Atualiza dropdown de entidade ao mudar tipo
  overlay.querySelector('#u-entity-type').addEventListener('change', function() {
    const type = this.value;
    const wrap = overlay.querySelector('#u-entity-wrap');
    const sel  = overlay.querySelector('#u-entity-id');
    wrap.style.display = type ? '' : 'none';
    sel.innerHTML = `<option value="">— Selecione —</option>${buildEntityOptions(type)}`;
  });

  // ── BUG FIX: Save handler sem recursão e com tratamento de erro explícito ──
  overlay.querySelector('#save-user').addEventListener('click', async () => {
    const btn = overlay.querySelector('#save-user');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const loginVal  = overlay.querySelector('#u-login').value.trim().toLowerCase();
      const nome      = overlay.querySelector('#u-nome').value.trim();
      const senha     = overlay.querySelector('#u-senha').value;
      const sel       = overlay.querySelector('#u-perfil');
      const perfilId  = sel.value;
      const perfilNome = sel.options[sel.selectedIndex]?.dataset.nome || perfilId;
      const isAdmin   = overlay.querySelector('#u-admin').checked;

      // Vínculo de entidade
      const entityType = overlay.querySelector('#u-entity-type').value || null;
      const entitySel  = overlay.querySelector('#u-entity-id');
      const entityId   = entityType && entitySel.value ? Number(entitySel.value) : null;
      const entityNome = entityType && entitySel.value
        ? (entitySel.options[entitySel.selectedIndex]?.dataset.nome || null)
        : null;

      if (!loginVal || !nome) { toast('Login e nome são obrigatórios.', 'error'); btn.disabled=false; btn.textContent='Salvar'; return; }
      if (isNew && !senha)    { toast('Senha obrigatória para novo usuário.', 'error'); btn.disabled=false; btn.textContent='Salvar'; return; }

      const data = {
        login: loginVal, nome, perfilId, perfilNome, isAdmin,
        senha: senha || user.senha,
        entityType, entityId, entityNome,
      };

      // dbPut é autocontido — não compartilha transação com auditLog
      await dbPut('usuarios', data);
      // auditLog numa transação separada e independente
      try { await auditLog(`${isNew?'Criou':'Editou'} usuário ${loginVal}`, `perfil: ${perfilNome}${entityType?' · vínculo:'+entityType:''}`); } catch(_){}

      toast(isNew?'Usuário criado.':'Usuário atualizado.', 'success');
      closeModal();
      refresh();
    } catch(err) {
      console.error('openUserModal save error:', err);
      toast('Erro ao salvar usuário: ' + (err.message||err), 'error');
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  });
}


// Global accordion toggle (called from inline onclick)
window.toggleAcc = function(key) {
  // Find and call the local toggleAcc inside the current divergencias page scope
  if (window._divToggleAcc) window._divToggleAcc(key);
};


// ===================== BOOT — FASE 1 =====================
// Os módulos core/*.js são carregados com defer e populam window.*
// antes deste DOMContentLoaded. O script inline usa as funções globais.
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('main').style.display    = 'none';
  document.getElementById('sidebar').style.display = 'none';

  document.addEventListener('db-login-submit', async () => {
    const loginComp = document.getElementById('login');
    const { login, password } = loginComp.getCredentials();
    
    try {
      const success = await doLogin(login, password);
      
      if (success) {
        loginComp.reset();
      } else {
        // Erro já foi setado dentro de doLogin
      }
    } catch (err) {
      console.error("Erro no processo de login:", err);
      loginComp.setError('Erro ao conectar ao banco de dados.');
    }
  });

  document.addEventListener('db-navigate', function (e) {
    var page = e.detail.page;
    if (!canAccess(page)) { toast('Sem permissão para acessar esta página.', 'error'); return; }
    navigate(page);
  });

  document.addEventListener('db-logout', function () {
    if (confirm('Deseja encerrar a sessão?')) doLogout();
  });

  var dbInitPromise = initDB();
  window.dbReady = dbInitPromise;

  dbInitPromise.then(async function () {
    var initAdmin = window.initDefaultAdmin;
    if (typeof initAdmin === 'function') {
      await initAdmin();
    } else {
      console.warn('window.initDefaultAdmin não está definido. Verifique core/auth.js.');
    }
    const perfis = await dbAll('perfis_acesso');
    if (perfis.length === 0) {
      for (const p of PERFIS_DEFAULT) {
        await dbPut('perfis_acesso', { ...p, permissoes: buildDefaultPerms() });
      }
    }
    const loginEl = document.getElementById('login');
    if (loginEl && typeof loginEl.focus === 'function') {
      loginEl.focus();
    }
  }).catch(function (err) {
    const loginEl = document.getElementById('login');
    var message = 'Erro ao inicializar o banco de dados.';
    if (err && err.message) message += ' ' + err.message;
    if (loginEl && typeof loginEl.setError === 'function') {
      loginEl.setError(message);
    }
    console.error('initDB failed:', err);
  });
});
</script>
</body>
</html>
