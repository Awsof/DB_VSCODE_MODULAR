<body>

<db-login id="login"></db-login>

<!-- SIDEBAR -->
<db-sidebar id="sidebar"></db-sidebar>

<!-- MAIN -->
<main id="main">
  <db-topbar id="topbar" title="Dashboard" subtitle="Visão geral da plataforma"></db-topbar>
  <div id="rls-global-banner" style="padding:0 0 2px 0"></div>
  <div id="content"></div>
</main>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>
<!-- TOAST -->
<div id="toast"></div>

<script>
// ── Declarações de bridging — garantem que o script inline parse sem erro ──
// O script inline executa imediatamente ao ser parseado, antes dos defer.
// Variáveis usadas no escopo top-level (atribuições a pages.X, let labPage,
// const LAB_PER_PAGE) precisam existir. O router.js (defer) se conecta ao
// mesmo objeto window.pages após carregar.
var pages = {};
var currentPage = '';

// ===================== PAGE: DASHBOARD =====================
pages.dashboard = async function() {
  updateTopbar('Dashboard Integração', 'Visão gerencial de clientes e integrações', `<button class="btn-report" id="dash-int-report">📄 Gerar Relatório</button>`);

  const [_clientesRaw, reps, sistemas, chamados, envios] = await Promise.all([
    dbAll('clientes'), dbAll('representantes'), dbAll('sistemas'), dbAll('chamados'), dbAll('envios')
  ]);
  // ── RLS: filtrar clientes pelo vínculo do usuário ──
  const clientes = applyDataFilter(_clientesRaw, reps);
  const repById = {}; for(const r of reps) repById[r.id] = r;
  const sysById = {}; for(const s of sistemas) sysById[s.id] = s;
  const chamadosByCliente = {};
  for(const ch of chamados){ if(!chamadosByCliente[ch.fk_cliente]) chamadosByCliente[ch.fk_cliente]=[]; chamadosByCliente[ch.fk_cliente].push(ch); }
  const enviosByCliente = {};
  for(const ev of envios){ if(!enviosByCliente[ev.fk_cliente]) enviosByCliente[ev.fk_cliente]={}; enviosByCliente[ev.fk_cliente][ev.tipoEnvio]=(enviosByCliente[ev.fk_cliente][ev.tipoEnvio]||0)+ev.qntEnvio; }

  // Pre-compute divergencias counts for div_status chart
  const _ENVIO_CONV=new Set(['INTEGRACAO','E-DB INTEGRACAO']),_ENVIO_WS=new Set(['ETIQUETA PRIMARIA']);
  const _envByC={}; for(const ev of envios){ if(!_envByC[ev.fk_cliente])_envByC[ev.fk_cliente]={tipos:new Set()}; _envByC[ev.fk_cliente].tipos.add(ev.tipoEnvio.toUpperCase()); }
  const div1=[],div2=[],div3=[],div4=[];
  for(const c of clientes){
    const cod=String(c.Codigo);
    const chs=chamadosByCliente[cod]||[];
    const envTipos=_envByC[cod]?[..._envByC[cod].tipos]:[];
    const tipoIntExp=getTipoIntExpected(chs);
    const temInt=tipoIntExp!=='SEM_INT';
    const envInt=envTipos.some(t=>_ENVIO_CONV.has(t)||_ENVIO_WS.has(t));
    const envQ=envTipos.length>0;
    const sys=sysById[c.fk_sistema];
    if(temInt&&!envQ) div1.push(c);
    if(!temInt&&envInt) div2.push(c);
    if(temInt&&envQ){const te=envTipos.filter(t=>_ENVIO_CONV.has(t)||_ENVIO_WS.has(t));if(te.length>0){let d=false;if(tipoIntExp==='CONVENCIONAL'&&te.some(t=>_ENVIO_WS.has(t)))d=true;if(tipoIntExp==='WEBSERVICE'&&te.some(t=>_ENVIO_CONV.has(t)))d=true;if(d)div3.push(c);}}
    if(sys?.mensalidadeHabilitada&&!envQ) div4.push(c);
  }

  // Pre-compute all chart datasets
  const STATUS_LABELS = {none:'Sem Integração',inactive:'Integração Inativada',active:'Integrado',impl:'Em Implantação'};
  const ufCount={}, repCount={}, sysCount={}, statusCount={none:0,inactive:0,active:0,impl:0}, envioTipoCount={};
  for(const c of clientes){
    if(c.UF) ufCount[c.UF]=(ufCount[c.UF]||0)+1;
    if(c.fk_representante) repCount[c.fk_representante]=(repCount[c.fk_representante]||0)+1;
    if(c.fk_sistema) sysCount[c.fk_sistema]=(sysCount[c.fk_sistema]||0)+1;
    const st = getIntStatus(chamadosByCliente[c.Codigo]||[]);
    statusCount[st]=(statusCount[st]||0)+1;
  }
  for(const ev of envios){ envioTipoCount[ev.tipoEnvio]=(envioTipoCount[ev.tipoEnvio]||0)+ev.qntEnvio; }

  const PALETTE = ['#003761','#0F9B94','#C49B3C','#6c5ce7','#00b894','#d63031','#0984e3','#00cec9','#e17055','#a29bfe','#fd79a8','#55efc4'];

  // Date range state for "status_mes" chart
  const intDateState = { ini: '', fim: '' };

  const DATASETS = {
    'integrados_uf': { label:'Integrados por UF (Top 10)',      type:'bar', horiz:true,  data:()=>{ const e=Object.entries((() => { const m={}; for(const c of clientes){ if(c.UF&&getIntStatus(chamadosByCliente[c.Codigo]||[])==='active') m[c.UF]=(m[c.UF]||0)+1; } return m; })()).sort((a,b)=>b[1]-a[1]).slice(0,10); return {labels:e.map(x=>x[0]),vals:e.map(x=>x[1]),colors:e.map((_,i)=>PALETTE[i%PALETTE.length])}; }},
    'div_status':    { label:'Resumo de Divergências',           type:'doughnut', horiz:false, data:()=>{ const [aI,sI,dT,mS]=[div1.length,div2.length,div3.length,div4.length]; return {labels:['Int. Ativa sem Envio','Sem Int. enviando','Tipo Divergente','Mens. sem Envio'],vals:[aI,sI,dT,mS],colors:['#d63031','#C49B3C','#6c5ce7','#0984e3']}; }},
    'clientes_sys':  { label:'Clientes por Sistema',             type:'doughnut', horiz:false, data:()=>{ const e=Object.entries(sysCount).sort((a,b)=>b[1]-a[1]).slice(0,10); return {labels:e.map(x=>sysById[x[0]]?.nome||x[0]),vals:e.map(x=>x[1]),colors:e.map((_,i)=>PALETTE[i%PALETTE.length])}; }},
    'status_int':    { label:'Status de Integração',             type:'doughnut', horiz:false, data:()=>{ const e=Object.entries(statusCount).filter(x=>x[1]>0); return {labels:e.map(x=>STATUS_LABELS[x[0]]),vals:e.map(x=>x[1]),colors:['#8a96a8','#d63031','#0F9B94','#C49B3C']}; }},
    'envio_tipo':    { label:'Volume por Tipo de Envio',         type:'bar', horiz:false, data:()=>{ const e=Object.entries(envioTipoCount).sort((a,b)=>b[1]-a[1]); return {labels:e.map(x=>x[0]),vals:e.map(x=>x[1]),colors:e.map((_,i)=>PALETTE[i%PALETTE.length])}; }},
    'status_mes':    { label:'Status Integrações por Mês', type:'bar', horiz:false, hasDateRange:true, data:()=>{
      // Group chamados by month of dataFinalizacao (Completion Date) — per spec
      const mesCount={}; const ini=intDateState.ini; const fim=intDateState.fim;
      for(const ch of chamados){
        const m=(ch.dataFinalizacao||'').slice(0,7); if(!m) continue;
        if(ini&&m<ini.slice(0,7)) continue;
        if(fim&&m>fim.slice(0,7)) continue;
        if(!mesCount[m]) mesCount[m]={active:0,inactive:0,impl:0};
        const st=getIntStatus(chamadosByCliente[ch.fk_cliente]||[]);
        if(mesCount[m][st]!==undefined) mesCount[m][st]++;
      }
      const ms=Object.keys(mesCount).sort();
      return {labels:ms, multiDatasets:[
        {label:'Integrado',   data:ms.map(m=>mesCount[m].active),   color:'#0F9B94'},
        {label:'Implantação', data:ms.map(m=>mesCount[m].impl),     color:'#C49B3C'},
        {label:'Inativado',   data:ms.map(m=>mesCount[m].inactive), color:'#d63031'},
      ]};
    }},
    'status_analista': { label:'Status por Analista', type:'bar', horiz:true, hasDateRange:true, data:()=>{
      // Group chamados by analista, filtered by dataFinalizacao range
      const ini=intDateState.ini; const fim=intDateState.fim;
      const anaCount={};
      for(const ch of chamados){
        const ana=ch.analista||'(sem analista)';
        const mFin=(ch.dataFinalizacao||'').slice(0,7);
        // Apply date filter on dataFinalizacao if set
        if(ini&&mFin&&mFin<ini.slice(0,7)) continue;
        if(fim&&mFin&&mFin>fim.slice(0,7)) continue;
        if(!anaCount[ana]) anaCount[ana]={active:0,inactive:0,impl:0};
        const st=getIntStatus(chamadosByCliente[ch.fk_cliente]||[]);
        if(anaCount[ana][st]!==undefined) anaCount[ana][st]++;
      }
      const anas=Object.keys(anaCount).sort((a,b)=>{
        const ta=Object.values(anaCount[a]).reduce((s,v)=>s+v,0);
        const tb=Object.values(anaCount[b]).reduce((s,v)=>s+v,0);
        return tb-ta;
      }).slice(0,10);
      return {labels:anas, multiDatasets:[
        {label:'Integrado',   data:anas.map(a=>anaCount[a].active),   color:'#0F9B94'},
        {label:'Implantação', data:anas.map(a=>anaCount[a].impl),     color:'#C49B3C'},
        {label:'Inativado',   data:anas.map(a=>anaCount[a].inactive), color:'#d63031'},
      ]};
    }},
    'prazo_analista': { label:'Prazo (Dias Úteis) por Analista', type:'bar', horiz:true, hasDateRange:true, data:()=>{
      // Calculate business-day lead time between dataSolicitacao and dataFinalizacao
      function bizDays(d1, d2) {
        if(!d1||!d2) return null;
        const start=new Date(d1), end=new Date(d2);
        if(isNaN(start)||isNaN(end)||end<start) return null;
        let count=0, cur=new Date(start);
        while(cur<=end){ const day=cur.getDay(); if(day!==0&&day!==6) count++; cur.setDate(cur.getDate()+1); }
        return Math.max(count-1,0);
      }
      const ini=intDateState.ini; const fim=intDateState.fim;
      const anaDays={}, anaQty={};
      for(const ch of chamados){
        if(!ch.dataFinalizacao) continue;
        const mFin=(ch.dataFinalizacao||'').slice(0,7);
        if(ini&&mFin<ini.slice(0,7)) continue;
        if(fim&&mFin>fim.slice(0,7)) continue;
        const d=bizDays(ch.dataSolicitacao, ch.dataFinalizacao);
        if(d===null) continue;
        const ana=ch.analista||'(sem analista)';
        anaDays[ana]=(anaDays[ana]||0)+d; anaQty[ana]=(anaQty[ana]||0)+1;
      }
      const anas=Object.keys(anaDays).sort((a,b)=>(anaDays[b]/anaQty[b])-(anaDays[a]/anaQty[a])).slice(0,10);
      return {labels:anas.map(a=>`${a} (${anaQty[a]})`),
              vals:anas.map(a=>parseFloat((anaDays[a]/anaQty[a]).toFixed(1))),
              colors:anas.map((_,i)=>PALETTE[i%PALETTE.length])};
    }},
  };

  const CHART_IDS = ['dci-0','dci-1','dci-2','dci-3'];
  const chartInstances = {};
  const chartChoices = { 'dci-0':'integrados_uf', 'dci-1':'div_status', 'dci-2':'clientes_sys', 'dci-3':'status_mes' };

  function buildSelect(id) {
    const dateRange = `<div id="range-${id}" style="display:none;gap:4px;align-items:center;margin-top:6px">
      <span style="font-size:10px;color:var(--text3)">De:</span>
      <input type="month" style="font-size:11px;padding:2px 5px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none" oninput="window._intDateChange('${id}','ini',this.value)">
      <span style="font-size:10px;color:var(--text3)">Até:</span>
      <input type="month" style="font-size:11px;padding:2px 5px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none" oninput="window._intDateChange('${id}','fim',this.value)">
    </div>`;
    return `<div><select class="dyn-chart-select" data-chart-id="${id}" onchange="window._intDashChange(this)">
      ${Object.entries(DATASETS).map(([k,v])=>`<option value="${k}" ${chartChoices[id]===k?'selected':''}>${v.label}</option>`).join('')}
    </select>${dateRange}</div>`;
  }

  function renderChart(id) {
    const key = chartChoices[id];
    const ds  = DATASETS[key];
    const d   = ds.data();
    if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
    const ctx = document.getElementById(`canvas-${id}`);
    if (!ctx) return;
    const isDonut = ds.type === 'doughnut';

    // Date range UI for charts that support it
    const rangeWrap = document.getElementById(`range-${id}`);
    if (rangeWrap) rangeWrap.style.display = ds.hasDateRange ? 'flex' : 'none';

    if (d.multiDatasets) {
      // Multi-series bar chart
      chartInstances[id] = new Chart(ctx, {
        type: 'bar',
        data: { labels: d.labels, datasets: d.multiDatasets.map(md => ({
          label: md.label, data: md.data,
          backgroundColor: md.color + 'aa', borderColor: md.color, borderWidth: 1, borderRadius: 3
        }))},
        options: { responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ position:'bottom', labels:{color:'#8a96a8',font:{size:10},boxWidth:10} } },
          scales:{ x:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}}, y:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}} }
        }
      });
    } else {
      chartInstances[id] = new Chart(ctx, {
        type: ds.type,
        data: { labels: d.labels, datasets:[{ data:d.vals, backgroundColor:d.colors.map(c=>c+'cc'), borderColor:d.colors, borderWidth:1, borderRadius: isDonut?0:3, hoverOffset:isDonut?6:0 }] },
        options: {
          indexAxis: ds.horiz?'y':'x', responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ display:isDonut, position:'right', labels:{color:'#8a96a8',font:{size:10},boxWidth:10} } },
          scales: isDonut ? {} : {
            x:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}},
            y:{ticks:{color:'#8a96a8',font:{size:10}},grid:{color:'#e4e8ef'}}
          }
        }
      });
    }
  }

  window._intDashChange = function(sel) {
    const id = sel.dataset.chartId;
    chartChoices[id] = sel.value;
    renderChart(id);
  };
  window._intDateChange = function(id, field, val) {
    intDateState[field] = val;
    renderChart(id);
  };

  document.getElementById('content').innerHTML = `
    <div class="metrics" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
      <div class="metric accent"><div class="metric-label">Total Clientes</div><div class="metric-val">${clientes.length.toLocaleString('pt-BR')}</div><div class="metric-sub">Laboratórios</div></div>
      <div class="metric green"><div class="metric-label">Integrados</div><div class="metric-val">${statusCount.active.toLocaleString('pt-BR')}</div><div class="metric-sub">${((statusCount.active/Math.max(clientes.length,1))*100).toFixed(1)}% do total</div></div>
      <div class="metric amber"><div class="metric-label">Em Implantação</div><div class="metric-val">${statusCount.impl.toLocaleString('pt-BR')}</div><div class="metric-sub">Chamados em aberto</div></div>
      <div class="metric purple"><div class="metric-label">Sem Integração</div><div class="metric-val">${statusCount.none.toLocaleString('pt-BR')}</div><div class="metric-sub">Sem chamados</div></div>
    </div>
    <div class="dyn-chart-grid">
      ${CHART_IDS.map(id=>`
        <div class="dyn-chart-card">
          <div class="dyn-chart-header">
            <span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">Gráfico</span>
            ${buildSelect(id)}
          </div>
          <div class="dyn-chart-wrap"><canvas id="canvas-${id}"></canvas></div>
        </div>`).join('')}
    </div>
  `;

  CHART_IDS.forEach(id => renderChart(id));

  document.getElementById('dash-int-report')?.addEventListener('click', async () => {
    const SL={none:'Sem Integração',inactive:'Integração Inativada',active:'Integrado',impl:'Em Implantação'};
    const rows=clientes.map(c=>[c.Codigo,c.NomeFantasia||c.RazaoSocial,c.UF,repById[c.fk_representante]?.nome||'—',sysById[c.fk_sistema]?.nome||'—',SL[getIntStatus(chamadosByCliente[c.Codigo]||[])]||'—']);
    generateReport('Dashboard Integração','Status de Integração',[{heading:`Laboratórios (${rows.length})`,headers:['Código','Nome','UF','Representante','Sistema','Status'],rows}]);
  });
};



// ===================== PAGE: LABORATÓRIOS =====================
let labPage = 1, labSearch = '', labSearchCodigo = '', labSearchCNPJ = '', labUF = '', labRep = '', labAnalista = '', labIntStatus = '';
const LAB_PER_PAGE = 24;

pages.laboratorios = async function() {
  updateTopbar('Laboratórios', 'Clientes / Laboratórios cadastrados', '');

  const [_clientesLab, reps, sistemas, allChamados, allEnvios] = await Promise.all([
    dbAll('clientes'), dbAll('representantes'), dbAll('sistemas'), dbAll('chamados'), dbAll('envios')
  ]);
  // ── RLS: filtrar clientes pelo vínculo do usuário ──
  const clientes = applyDataFilter(_clientesLab, reps);
  const repById = {}; for (const r of reps) repById[r.id] = r;
  const sysById = {}; for (const s of sistemas) sysById[s.id] = s;
  const ufs = [...new Set(clientes.map(c=>c.UF).filter(Boolean))].sort();

  const analistaSet = [...new Set(allChamados.map(ch=>ch.analista).filter(Boolean))].sort();
  const clienteAnalistaMap = {};
  for (const ch of allChamados) {
    if (!clienteAnalistaMap[ch.fk_cliente]) clienteAnalistaMap[ch.fk_cliente] = new Set();
    if (ch.analista) clienteAnalistaMap[ch.fk_cliente].add(ch.analista);
  }
  const chamadosByCliente = {};
  for (const ch of allChamados) {
    if (!chamadosByCliente[ch.fk_cliente]) chamadosByCliente[ch.fk_cliente] = [];
    chamadosByCliente[ch.fk_cliente].push(ch);
  }
  const enviosByCliente = {};
  for (const ev of allEnvios) {
    if (!enviosByCliente[ev.fk_cliente]) enviosByCliente[ev.fk_cliente] = {};
    const t = ev.tipoEnvio;
    enviosByCliente[ev.fk_cliente][t] = (enviosByCliente[ev.fk_cliente][t] || 0) + ev.qntEnvio;
  }

  const LAB_TABLE_PER_PAGE = 50;

  const render = () => {
    let filtered = clientes.filter(c => {
      const txtOk = !labSearch ||
        (c.NomeFantasia||'').toLowerCase().includes(labSearch.toLowerCase()) ||
        (c.RazaoSocial||'').toLowerCase().includes(labSearch.toLowerCase());
      const codOk = !labSearchCodigo || String(c.Codigo||'').toLowerCase().includes(labSearchCodigo.toLowerCase());
      const cnpjOk = !labSearchCNPJ || String(c.CNPJ||'').replace(/\D/g,'').includes(labSearchCNPJ.replace(/\D/g,''));
      const ufOk  = !labUF  || c.UF === labUF;
      const repOk = !labRep || String(c.fk_representante) === labRep;
      const anaOk = !labAnalista || (clienteAnalistaMap[c.Codigo] && clienteAnalistaMap[c.Codigo].has(labAnalista));
      const chs   = chamadosByCliente[c.Codigo] || [];
      const intStatusOk = !labIntStatus || getIntStatus(chs) === labIntStatus;
      return txtOk && codOk && cnpjOk && ufOk && repOk && anaOk && intStatusOk;
    });

    filtered.sort((a, b) => {
      const ca = isNaN(a.Codigo) ? String(a.Codigo) : Number(a.Codigo);
      const cb = isNaN(b.Codigo) ? String(b.Codigo) : Number(b.Codigo);
      return ca < cb ? -1 : ca > cb ? 1 : 0;
    });

    const total = filtered.length;
    const totalPages = Math.ceil(total / LAB_TABLE_PER_PAGE);
    if (labPage > totalPages) labPage = 1;
    const slice = filtered.slice((labPage-1)*LAB_TABLE_PER_PAGE, labPage*LAB_TABLE_PER_PAGE);

    const ENVIO_CONV = new Set(['INTEGRACAO', 'E-DB INTEGRACAO']);
    const ENVIO_WS   = new Set(['ETIQUETA PRIMARIA']);
    function envChipColor(t) {
      if (ENVIO_CONV.has(t)) return 'color:var(--accent2);border-color:rgba(15,155,148,.3)';
      if (ENVIO_WS.has(t))   return 'color:var(--purple);border-color:rgba(108,92,231,.3)';
      return '';
    }

    document.getElementById('lab-table-body').innerHTML = slice.length === 0
      ? `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">Nenhum resultado encontrado.</td></tr>`
      : slice.map(c => {
          const rep = repById[c.fk_representante];
          const sys = sysById[c.fk_sistema];
          const chs = chamadosByCliente[c.Codigo] || [];
          const chCount = chs.length;
          const intStatus = getIntStatus(chs);
          const envMap = enviosByCliente[c.Codigo] || {};
          const envEntries = Object.entries(envMap).sort((a,b)=>b[1]-a[1]);
          const cts = Array.isArray(c.contatos) && c.contatos.length ? c.contatos : (c.NomeContato ? [{nome:c.NomeContato}] : []);

          return `<tr>
            <td style="font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap">${c.Codigo}</td>
            <td>
              <div style="font-weight:600;color:var(--navy);font-size:13px">${c.NomeFantasia || c.RazaoSocial || '(sem nome)'}</div>
              ${c.CNPJ ? `<div style="font-size:10px;color:var(--text3)">${c.CNPJ}</div>` : ''}
            </td>
            <td><span class="badge uf">${c.UF||'?'}</span></td>
            <td style="font-size:12px;color:var(--text2)">${rep ? rep.nome.split(' ').slice(0,2).join(' ') : '—'}</td>
            <td style="font-size:12px">${sys ? `<span class="badge sys">${sys.nome}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
            <td>${renderIntStatusBadge(intStatus)}</td>
            <td style="font-size:11px">
              ${envEntries.length ? envEntries.map(([t,q])=>`<span class="lab-envio-chip" style="${envChipColor(t)}">${t}<span class="chip-qty">${q.toLocaleString('pt-BR')}</span></span>`).join(' ') : '<span style="color:var(--text3);font-size:11px">—</span>'}
            </td>
            <td style="font-size:12px;color:var(--text2)">${cts[0]?.nome || '—'}</td>
            <td style="white-space:nowrap">
              <div style="display:flex;gap:5px">
                <button class="btn sm secondary" data-view="${c.Codigo}" style="font-size:11px;padding:4px 8px">Ver</button>
                ${canBtn('laboratorios','edit-btn') ? `<button class="btn sm" data-edit="${c.Codigo}" style="font-size:11px;padding:4px 8px">Editar</button>` : ''}
              </div>
            </td>
          </tr>`;
        }).join('');

    // Sortable laboratórios (opera sobre `filtered`, redefine o slice)
    const labThead = document.querySelector('#lab-table-body')?.closest('table')?.querySelector('thead');
    if (labThead && filtered.length > 0) {
      makeSortable(labThead, document.getElementById('lab-table-body'), filtered, [
        { getValue: c => Number(c.Codigo) || c.Codigo },
        { getValue: c => c.NomeFantasia || c.RazaoSocial || '' },
        { getValue: c => c.UF || '' },
        { getValue: c => repById[c.fk_representante]?.nome || '' },
        { getValue: c => sysById[c.fk_sistema]?.nome || '' },
        { getValue: c => getIntStatus(chamadosByCliente[c.Codigo] || []) },
      ], c => {
        const rep2 = repById[c.fk_representante];
        const sys2 = sysById[c.fk_sistema];
        const chs2 = chamadosByCliente[c.Codigo] || [];
        const intS2 = getIntStatus(chs2);
        const envMap2 = enviosByCliente[c.Codigo] || {};
        const envE2 = Object.entries(envMap2).sort((a,b)=>b[1]-a[1]);
        const cts2 = Array.isArray(c.contatos)&&c.contatos.length?c.contatos:(c.NomeContato?[{nome:c.NomeContato}]:[]);
        return `<tr>
          <td style="font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap">${c.Codigo}</td>
          <td><div style="font-weight:600;color:var(--navy);font-size:13px">${c.NomeFantasia||c.RazaoSocial||'(sem nome)'}</div>${c.CNPJ?`<div style="font-size:10px;color:var(--text3)">${c.CNPJ}</div>`:''}</td>
          <td><span class="badge uf">${c.UF||'?'}</span></td>
          <td style="font-size:12px;color:var(--text2)">${rep2?rep2.nome.split(' ').slice(0,2).join(' '):'—'}</td>
          <td style="font-size:12px">${sys2?`<span class="badge sys">${sys2.nome}</span>`:'<span style="color:var(--text3)">—</span>'}</td>
          <td>${renderIntStatusBadge(intS2)}</td>
          <td style="font-size:11px">${envE2.length?envE2.map(([t,q])=>`<span class="lab-envio-chip" style="${envChipColor(t)}">${t}<span class="chip-qty">${q.toLocaleString('pt-BR')}</span></span>`).join(' '):'<span style="color:var(--text3);font-size:11px">—</span>'}</td>
          <td style="font-size:12px;color:var(--text2)">${cts2[0]?.nome||'—'}</td>
          <td style="white-space:nowrap"><div style="display:flex;gap:5px">
            <button class="btn sm secondary" data-view="${c.Codigo}" style="font-size:11px;padding:4px 8px">Ver</button>
            ${canBtn('laboratorios','edit-btn')?`<button class="btn sm" data-edit="${c.Codigo}" style="font-size:11px;padding:4px 8px">Editar</button>`:''}
          </div></td>
        </tr>`;
      });
    }

    // Pagination
    const pagEl = document.getElementById('lab-pagination');
    if (totalPages <= 1) { pagEl.innerHTML = `<span class="page-info">${total} resultado${total!==1?'s':''}</span>`; return; }
    let pHtml = `<span class="page-info">${total} resultados</span>`;
    if (labPage > 1) pHtml += `<button class="page-btn" data-p="${labPage-1}">‹ Anterior</button>`;
    const start = Math.max(1, labPage-2), end = Math.min(totalPages, labPage+2);
    for (let i = start; i <= end; i++) pHtml += `<button class="page-btn ${i===labPage?'active':''}" data-p="${i}">${i}</button>`;
    if (labPage < totalPages) pHtml += `<button class="page-btn" data-p="${labPage+1}">Próxima ›</button>`;
    pagEl.innerHTML = pHtml;
  };

  document.getElementById('content').innerHTML = `
    <div class="toolbar" style="flex-wrap:wrap;gap:8px">
      <div class="search-wrap no-icon" style="flex:0 0 110px;min-width:90px">
        <input type="text" placeholder="Código..." id="lab-search-codigo" value="${labSearchCodigo}">
      </div>
      <div class="search-wrap" style="flex:2;min-width:180px">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
        <input type="text" placeholder="Nome Fantasia / Razão Social..." id="lab-search" value="${labSearch}">
      </div>
      <div class="search-wrap no-icon" style="flex:1;min-width:120px">
        <input type="text" placeholder="CNPJ..." id="lab-search-cnpj" value="${labSearchCNPJ}">
      </div>
      <select id="lab-uf">
        <option value="">Todas as UFs</option>
        ${ufs.map(u=>`<option value="${u}" ${u===labUF?'selected':''}>${u}</option>`).join('')}
      </select>
      <select id="lab-rep">
        <option value="">Todos os representantes</option>
        ${[...reps].sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR')).map(r=>`<option value="${r.id}" ${String(r.id)===labRep?'selected':''}>${r.nome}</option>`).join('')}
      </select>
      <select id="lab-analista">
        <option value="">Todos os analistas</option>
        ${analistaSet.map(a=>`<option value="${a}" ${a===labAnalista?'selected':''}>${a}</option>`).join('')}
      </select>
      <select id="lab-int-status">
        <option value="">Todos os status</option>
        <option value="none"     ${labIntStatus==='none'    ?'selected':''}>Sem Integração</option>
        <option value="inactive" ${labIntStatus==='inactive'?'selected':''}>Integração Inativada</option>
        <option value="active"   ${labIntStatus==='active'  ?'selected':''}>Integrado</option>
        <option value="impl"     ${labIntStatus==='impl'    ?'selected':''}>Em Implantação</option>
      </select>
    </div>
    <div class="table-wrap" style="margin-bottom:12px">
      <table style="width:100%">
        <thead>
          <tr>
            <th style="width:70px" data-sort="0">Código</th>
            <th data-sort="1">Nome</th>
            <th style="width:50px" data-sort="2">UF</th>
            <th data-sort="3">Representante</th>
            <th data-sort="4">Sistema</th>
            <th style="width:150px" data-sort="5">Status Int.</th>
            <th>Tipos de Envio</th>
            <th>Contato</th>
            <th style="width:110px">Ações</th>
          </tr>
        </thead>
        <tbody id="lab-table-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="lab-pagination"></div>
  `;

  render();

  document.getElementById('lab-search').addEventListener('input', e => { labSearch = e.target.value; labPage = 1; render(); });
  document.getElementById('lab-search-codigo').addEventListener('input', e => { labSearchCodigo = e.target.value; labPage = 1; render(); });
  document.getElementById('lab-search-cnpj').addEventListener('input', e => { labSearchCNPJ = e.target.value; labPage = 1; render(); });
  document.getElementById('lab-uf').addEventListener('change', e => { labUF = e.target.value; labPage = 1; render(); });
  document.getElementById('lab-rep').addEventListener('change', e => { labRep = e.target.value; labPage = 1; render(); });
  document.getElementById('lab-analista').addEventListener('change', e => { labAnalista = e.target.value; labPage = 1; render(); });
  document.getElementById('lab-int-status').addEventListener('change', e => { labIntStatus = e.target.value; labPage = 1; render(); });
  document.getElementById('lab-table-body').addEventListener('click', e => {
    const editBtn = e.target.closest('[data-edit]');
    if (editBtn) { openLabModal(editBtn.dataset.edit, clientes, reps, sistemas, sysById); return; }
    const viewBtn = e.target.closest('[data-view]');
    if (viewBtn) openLabViewModal(viewBtn.dataset.view, repById, sysById, allChamados);
  });
  document.getElementById('lab-pagination').addEventListener('click', e => {
    const btn = e.target.closest('[data-p]');
    if (btn) { labPage = parseInt(btn.dataset.p); render(); window.scrollTo(0,0); }
  });
};

async function openLabViewModal(codigo, repById, sysById, allChamados) {
  const c = await dbGet('clientes', codigo);
  if (!c) return;

  const rep = repById[c.fk_representante];
  const sys = sysById[c.fk_sistema];
  const chamados = allChamados
    .filter(ch => ch.fk_cliente === codigo)
    .sort((a,b) => (b.dataSolicitacao||'').localeCompare(a.dataSolicitacao||''));
  const contatos = Array.isArray(c.contatos) && c.contatos.length ? c.contatos
    : (c.NomeContato ? [{nome:c.NomeContato, cargo:'', telefone:c.Telefone||'', email:''}] : []);

  const row = (label, val) => val
    ? `<div class="view-row"><span class="view-label">${label}</span><span class="view-val">${val}</span></div>`
    : '';

  openModal(`
    <div class="modal-header">
      <div class="modal-title">${c.NomeFantasia || c.RazaoSocial || '#'+c.Codigo}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
        ${row('Código', `<span style="font-family:var(--mono)">${c.Codigo}</span>`)}
        ${row('UF', `<span class="badge uf">${c.UF||'?'}</span>`)}
      </div>
      ${row('Nome Fantasia', c.NomeFantasia)}
      ${row('Razão Social', c.RazaoSocial)}
      ${row('CNPJ', c.CNPJ || (c.CodMatriz ? 'Ver Matriz #'+c.CodMatriz : null))}
      ${c.CodMatriz ? row('Matriz', `${c.NomeMatriz||''} · #${c.CodMatriz}`) : ''}
      ${row('Grupo', c.Grupo)}
      ${row('Representante', c.Representante)}
      ${c.assessor ? row('Assessor', `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(196,155,60,.12);color:var(--gold);border:1px solid rgba(196,155,60,.3)">${c.assessor}</span>`) : ''}
      ${c.categoria_especial ? row('Programa', programaBadge(c.categoria_especial)) : ''}
      ${row('Sistema', sys ? `<span class="badge sys">${sys.nome}</span>${sys.empresa?' · <span style="color:var(--text3)">'+sys.empresa+'</span>':''}` : null)}

      ${contatos.length ? `
        <div class="section-divider">Contatos (${contatos.length})</div>
        ${contatos.map(ct => `
          <div class="contato-item" style="margin-bottom:6px">
            <div class="contato-info">
              <div class="contato-nome">${ct.nome||'—'}${ct.cargo?' · <span style="font-weight:400;color:var(--text2)">'+ct.cargo+'</span>':''}</div>
              <div class="contato-meta">${[ct.telefone,ct.email].filter(Boolean).join(' · ')||'—'}</div>
            </div>
          </div>`).join('')}
      ` : ''}

      <div class="section-divider">Chamados de Integração (${chamados.length})</div>
      ${chamados.length === 0
        ? `<div style="font-size:12px;color:var(--text3);padding:6px 0">Nenhum chamado registrado.</div>`
        : chamados.map(ch => {
            const sysName = sysById[ch.fk_sistema]?.nome || '—';
            return `<div class="chamado-item">
              <div class="chamado-header">
                <div>
                  <span class="chamado-num">#${ch.numeroChamado||'—'}</span>
                  <span class="chamado-analista" style="margin-left:8px">${ch.analista||'—'}</span>
                </div>
              </div>
              <div class="chamado-dates">
                <span>Solicitação: <strong style="color:var(--text2)">${ch.dataSolicitacao||'—'}</strong></span>
                ${ch.dataFinalizacao?`<span>Finalização: <strong style="color:var(--text2)">${ch.dataFinalizacao}</strong></span>`:''}
              </div>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span style="font-size:12px;color:var(--text3)">Sistema: <strong style="color:var(--text2)">${sysName}</strong></span>
                ${ch.tipoIntegracao?`<span class="badge tag" style="font-size:10px">${ch.tipoIntegracao}</span>`:''}
                ${ch.integracaoAtiva
                  ? `<span class="chamado-status-on">✓ Integração Ativa</span>`
                  : ch.dataFinalizacao
                    ? `<span class="chamado-status-off">✗ Integração Inativada</span>`
                    : `<span class="chamado-status-impl">⏳ Em Implantação</span>`}
              </div>
            </div>`;
          }).join('')}
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

async function openLabModal(codigo, clientes, reps, sistemas, sysById) {
  const [c, analistasDB] = await Promise.all([
    dbGet('clientes', codigo),
    dbAll('analistas'),
  ]);
  if (!c) return;

  // Apenas analistas ativos no dropdown do chamado
  const analistasAtivos = analistasDB.filter(a => a.ativo !== false);
  const analistasOptsHtml = `<option value="">— Selecione —</option>` +
    analistasAtivos.map(a => `<option value="${a.nome}">[${a.id}] ${a.nome} · ${a.cargo}</option>`).join('');

  // Multi-contatos: coerce legacy single-contato to array
  let labContatos = Array.isArray(c.contatos) ? [...c.contatos]
    : (c.NomeContato ? [{ nome: c.NomeContato, cargo: '', telefone: c.Telefone||'', email: '' }] : []);

  function renderLabContatosList() {
    const container = document.getElementById('lab-contatos-list');
    if (!container) return;
    container.innerHTML = labContatos.length === 0
      ? `<div style="font-size:12px;color:var(--text3);padding:4px 0">Nenhum contato cadastrado.</div>`
      : labContatos.map((ct, i) => `
        <div class="contato-item">
          <div class="contato-info">
            <div class="contato-nome">${ct.nome || '—'}${ct.cargo ? ' · <span style="font-weight:400;color:var(--text2)">' + ct.cargo + '</span>' : ''}</div>
            <div class="contato-meta">${[ct.telefone, ct.email].filter(Boolean).join(' · ') || '—'}</div>
          </div>
          <button class="contato-del" data-del-lct="${i}" title="Remover">×</button>
        </div>`).join('');
    container.querySelectorAll('[data-del-lct]').forEach(btn => {
      btn.addEventListener('click', () => {
        labContatos.splice(parseInt(btn.dataset.delLct), 1);
        renderLabContatosList();
      });
    });
  }

  // Load existing chamados for this client, sorted newest first
  const allChamados = await dbAll('chamados');
  let chamadosCliente = allChamados
    .filter(ch => ch.fk_cliente === codigo)
    .sort((a, b) => (b.dataSolicitacao || '').localeCompare(a.dataSolicitacao || ''));

  function renderChamadosList() {
    const container = document.getElementById('chamados-list');
    if (!container) return;
    if (chamadosCliente.length === 0) {
      container.innerHTML = `<div style="font-size:12px;color:var(--text3);padding:8px 0">Nenhum chamado registrado.</div>`;
      return;
    }

    const TIPOS_OPTS = ['Convencional (XML)', 'Webservice'];

    container.innerHTML = chamadosCliente.map(ch => {
      const sysName = sysById[ch.fk_sistema]?.nome || '—';
      const sysOpts = sistemas.map(s =>
        `<option value="${s.id}" ${s.id===ch.fk_sistema?'selected':''}>${s.nome}${s.empresa?' · '+s.empresa:''}</option>`
      ).join('');
      const anaOpts = `<option value="">— Selecione —</option>` +
        analistasAtivos.map(a =>
          `<option value="${a.nome}" ${a.nome===ch.analista?'selected':''}>[${a.id}] ${a.nome} · ${a.cargo}</option>`
        ).join('');
      return `<div class="chamado-item" id="ch-item-${ch.id}">
        <div class="chamado-header">
          <div>
            <span class="chamado-num">#${ch.numeroChamado || '—'}</span>
            <span class="chamado-analista" style="margin-left:8px">${ch.analista || '—'}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="chamado-edit-btn" data-edit-ch="${ch.id}" title="Editar chamado">✎</button>
            <button class="chamado-del" data-del-ch="${ch.id}" title="Excluir chamado">×</button>
          </div>
        </div>
        <div class="chamado-dates">
          <span>Solicitação: <strong style="color:var(--text2)">${ch.dataSolicitacao || '—'}</strong></span>
          ${ch.dataFinalizacao ? `<span>${ch.integracaoAtiva ? 'Finalização' : 'Inativação'}: <strong style="color:var(--text2)">${ch.dataFinalizacao}</strong></span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--text3)">Sistema: <strong style="color:var(--text2)">${sysName}</strong></span>
          ${ch.tipoIntegracao ? `<span class="badge tag" style="font-size:10px">${ch.tipoIntegracao}</span>` : ''}
          ${ch.integracaoAtiva
            ? `<span class="chamado-status-on">✓ Integração Ativa</span>`
            : ch.dataFinalizacao
              ? `<span class="chamado-status-off">✗ Integração Inativada</span>`
              : `<span class="chamado-status-impl">⏳ Em Implantação</span>`}
        </div>

        <!-- Inline edit form (hidden by default) -->
        <div class="chamado-edit-form" id="ch-edit-form-${ch.id}">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div><div class="field-label" style="font-size:10px;margin-bottom:3px">Número</div>
              <input type="text" id="ch-e-num-${ch.id}" value="${ch.numeroChamado||''}" style="padding:5px 8px;font-size:12px"></div>
            <div><div class="field-label" style="font-size:10px;margin-bottom:3px">Analista</div>
              <select id="ch-e-ana-${ch.id}" style="padding:5px 8px;font-size:12px;width:100%">
                ${anaOpts}
              </select></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div><div class="field-label" style="font-size:10px;margin-bottom:3px">Solicitação</div>
              <input type="date" id="ch-e-sol-${ch.id}" value="${ch.dataSolicitacao||''}" style="padding:5px 8px;font-size:12px"></div>
            <div><div class="field-label" style="font-size:10px;margin-bottom:3px">Finalização / Inativação</div>
              <input type="date" id="ch-e-fin-${ch.id}" value="${ch.dataFinalizacao||''}" style="padding:5px 8px;font-size:12px"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div><div class="field-label" style="font-size:10px;margin-bottom:3px">Sistema</div>
              <select id="ch-e-sys-${ch.id}" style="padding:5px 8px;font-size:12px;width:100%">
                <option value="">— Nenhum —</option>${sysOpts}
              </select></div>
            <div><div class="field-label" style="font-size:10px;margin-bottom:3px">Tipo</div>
              <select id="ch-e-tipo-${ch.id}" style="padding:5px 8px;font-size:12px;width:100%">
                <option value="">— Selecione —</option>
                ${TIPOS_OPTS.map(t=>`<option value="${t}" ${ch.tipoIntegracao===t?'selected':''}>${t}</option>`).join('')}
              </select></div>
          </div>
          <div class="checkbox-row" style="margin-bottom:10px">
            <input type="checkbox" id="ch-e-int-${ch.id}" ${ch.integracaoAtiva?'checked':''}>
            <label for="ch-e-int-${ch.id}" style="font-size:12px;cursor:pointer">Integração Ativa</label>
          </div>
          <div style="display:flex;gap:6px">
            <button class="chamado-edit-btn save" data-save-ch="${ch.id}">Salvar</button>
            <button class="chamado-edit-btn" data-cancel-ch="${ch.id}">Cancelar</button>
          </div>
        </div>
      </div>`;
    }).join('');

    // Bind delete
    container.querySelectorAll('[data-del-ch]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const chId = parseInt(btn.dataset.delCh);
        if (!confirm('Excluir este chamado?')) return;
        await dbDelete('chamados', chId);
        chamadosCliente = chamadosCliente.filter(ch => ch.id !== chId);
        renderChamadosList();
      });
    });

    // Bind edit toggle
    container.querySelectorAll('[data-edit-ch]').forEach(btn => {
      btn.addEventListener('click', () => {
        const chId = btn.dataset.editCh;
        const item = document.getElementById(`ch-item-${chId}`);
        const form = document.getElementById(`ch-edit-form-${chId}`);
        const isOpen = item.classList.contains('editing');
        // Close all other open edit forms
        container.querySelectorAll('.chamado-item.editing').forEach(el => el.classList.remove('editing'));
        container.querySelectorAll('.chamado-edit-form').forEach(el => { el.style.display='none'; });
        if (!isOpen) {
          item.classList.add('editing');
          form.style.display = 'block';
        }
      });
    });

    // Bind cancel
    container.querySelectorAll('[data-cancel-ch]').forEach(btn => {
      btn.addEventListener('click', () => {
        const chId = btn.dataset.cancelCh;
        document.getElementById(`ch-item-${chId}`)?.classList.remove('editing');
        const form = document.getElementById(`ch-edit-form-${chId}`);
        if (form) form.style.display = 'none';
      });
    });

    // Bind save
    container.querySelectorAll('[data-save-ch]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const chId = parseInt(btn.dataset.saveCh);
        const numero      = document.getElementById(`ch-e-num-${chId}`)?.value.trim();
        const analista    = document.getElementById(`ch-e-ana-${chId}`)?.value.trim();
        const dataSol     = document.getElementById(`ch-e-sol-${chId}`)?.value;
        const dataFin     = document.getElementById(`ch-e-fin-${chId}`)?.value;
        const fk_sistema  = parseInt(document.getElementById(`ch-e-sys-${chId}`)?.value) || null;
        const tipoInt     = document.getElementById(`ch-e-tipo-${chId}`)?.value;
        const integAtiva  = document.getElementById(`ch-e-int-${chId}`)?.checked;

        if (!numero) { toast('Número do chamado obrigatório.', 'error'); return; }

        const idx = chamadosCliente.findIndex(ch => ch.id === chId);
        if (idx === -1) return;

        const updated = {
          ...chamadosCliente[idx],
          numeroChamado: numero,
          analista,
          dataSolicitacao: dataSol || null,
          dataFinalizacao: dataFin || null,
          fk_sistema,
          tipoIntegracao: tipoInt,
          integracaoAtiva: integAtiva,
        };
        await dbPut('chamados', updated);

        // Update fk_sistema on client if integration active
        if (integAtiva && fk_sistema) {
          const freshCliente = await dbGet('clientes', codigo);
          if (freshCliente) await dbPut('clientes', { ...freshCliente, fk_sistema, _manual_fk_sistema: true });
        }

        chamadosCliente[idx] = updated;
        // Re-sort newest first
        chamadosCliente.sort((a,b) => (b.dataSolicitacao||'').localeCompare(a.dataSolicitacao||''));
        renderChamadosList();
        toast('Chamado atualizado.', 'success');
      });
    });
  }

  const overlay = openModal(`
    <div class="modal-header">
      <div class="modal-title">Laboratório · #${c.Codigo}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="lock-note" style="margin-bottom:16px;padding:8px 12px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="color:var(--gold)"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        <span>Campos da planilha são somente leitura. Campos editáveis abaixo são preservados na próxima importação.</span>
      </div>

      <div class="two-col">
        <div class="field-group"><div class="field-label">Nome Fantasia</div><div class="field-val locked">${c.NomeFantasia || '—'}</div></div>
        <div class="field-group"><div class="field-label">Código</div><div class="field-val locked">${c.Codigo}</div></div>
      </div>
      <div class="field-group"><div class="field-label">Razão Social</div><div class="field-val locked">${c.RazaoSocial || '—'}</div></div>
      <div class="two-col">
        <div class="field-group"><div class="field-label">CNPJ</div><div class="field-val locked">${c.CNPJ || (c.CodMatriz ? 'Ver Matriz #' + c.CodMatriz : '—')}</div></div>
        <div class="field-group"><div class="field-label">UF</div><div class="field-val locked">${c.UF || '—'}</div></div>
      </div>
      ${c.CodMatriz ? `<div class="field-group"><div class="field-label">Matriz</div><div class="field-val locked">${c.NomeMatriz || ''} · #${c.CodMatriz}</div></div>` : ''}
      <div class="two-col">
        <div class="field-group"><div class="field-label">Grupo</div><div class="field-val locked">${c.Grupo || '—'}</div></div>
        <div class="field-group"><div class="field-label">Representante</div><div class="field-val locked">${c.Representante || '—'}</div></div>
      </div>

      <div class="section-divider">Campos Editáveis</div>
      <div id="lab-contatos-list" style="margin-bottom:8px"></div>
      <div class="contato-add-form">
        <div class="field-label" style="margin-bottom:8px">Adicionar Contato</div>
        <div class="two-col" style="margin-bottom:8px">
          <div class="field-group" style="margin:0"><div class="field-label">Nome</div><input type="text" id="lct-nome" placeholder="Nome do responsável"></div>
          <div class="field-group" style="margin:0"><div class="field-label">Cargo</div><input type="text" id="lct-cargo" placeholder="Cargo / função"></div>
        </div>
        <div class="two-col" style="margin-bottom:8px">
          <div class="field-group" style="margin:0"><div class="field-label">Telefone</div><input type="tel" id="lct-tel" placeholder="(00) 00000-0000"></div>
          <div class="field-group" style="margin:0"><div class="field-label">E-mail</div><input type="email" id="lct-email" placeholder="email@exemplo.com"></div>
        </div>
        <button class="btn secondary" id="add-lct-btn" style="width:100%">+ Adicionar Contato</button>
      </div>

      <div class="section-divider">Chamados de Integração</div>

      <div id="chamados-list" style="margin-bottom:12px"></div>

      <div class="chamado-form" id="chamado-form">
        <div class="field-label" style="margin-bottom:10px">Novo Chamado</div>
        <div class="two-col" style="margin-bottom:10px">
          <div class="field-group" style="margin:0">
            <div class="field-label">Número do Chamado</div>
            <input type="text" id="ch-numero" placeholder="Ex: INC-0042">
          </div>
          <div class="field-group" style="margin:0">
            <div class="field-label">Analista</div>
            <select id="ch-analista">
              ${analistasOptsHtml}
            </select>
          </div>
        </div>
        <div class="two-col" style="margin-bottom:10px">
          <div class="field-group" style="margin:0">
            <div class="field-label">Data de Solicitação</div>
            <input type="date" id="ch-data-sol">
          </div>
          <div class="field-group" style="margin:0">
            <div class="field-label" id="ch-data-fin-label">Data de Finalização</div>
            <input type="date" id="ch-data-fin">
          </div>
        </div>
        <div class="field-group" style="margin-bottom:10px">
          <div class="field-label">Sistema</div>
          <select id="ch-sistema">
            <option value="">— Nenhum —</option>
            ${sistemas.map(s => `<option value="${s.id}">${s.nome} · ${s.empresa || ''}</option>`).join('')}
          </select>
        </div>
        <div class="field-group" style="margin-bottom:10px">
          <div class="field-label">Tipo de Integração</div>
          <select id="ch-tipo">
            <option value="">— Selecione —</option>
            <option value="Convencional (XML)">Convencional (XML)</option>
            <option value="Webservice">Webservice</option>
          </select>
        </div>
        <div class="checkbox-row" style="margin-bottom:12px">
          <input type="checkbox" id="ch-integracao">
          <label for="ch-integracao" style="font-size:13px;cursor:pointer">Integração Ativa</label>
        </div>
        <button class="btn" id="add-chamado-btn" style="width:100%">+ Registrar Chamado</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn" id="save-lab">Salvar Dados do Lab</button>
    </div>
  `);

  renderChamadosList();
  renderLabContatosList();

  // Add lab contato handler
  overlay.querySelector('#add-lct-btn').addEventListener('click', () => {
    const nome = overlay.querySelector('#lct-nome').value.trim();
    if (!nome) { toast('Informe ao menos o nome do contato.', 'error'); return; }
    labContatos.push({
      nome,
      cargo:    overlay.querySelector('#lct-cargo').value.trim(),
      telefone: overlay.querySelector('#lct-tel').value.trim(),
      email:    overlay.querySelector('#lct-email').value.trim(),
    });
    renderLabContatosList();
    overlay.querySelector('#lct-nome').value = '';
    overlay.querySelector('#lct-cargo').value = '';
    overlay.querySelector('#lct-tel').value = '';
    overlay.querySelector('#lct-email').value = '';
    overlay.querySelector('#lct-nome').focus();
  });

  // Add chamado handler
  overlay.querySelector('#add-chamado-btn').addEventListener('click', async () => {
    const numero      = overlay.querySelector('#ch-numero').value.trim();
    const analista    = overlay.querySelector('#ch-analista').value.trim();
    const dataSol     = overlay.querySelector('#ch-data-sol').value;
    const dataFin     = overlay.querySelector('#ch-data-fin').value;
    const fk_sistema  = parseInt(overlay.querySelector('#ch-sistema').value) || null;
    const tipoIntegracao  = overlay.querySelector('#ch-tipo').value;
    const integracaoAtiva = overlay.querySelector('#ch-integracao').checked;

    if (!numero) { toast('Informe o número do chamado.', 'error'); return; }
    if (!dataSol) { toast('Informe a data de solicitação.', 'error'); return; }
    if (integracaoAtiva && !tipoIntegracao) { toast('Selecione o Tipo de Integração.', 'error'); return; }

    // Check: multiple active integrations warning
    if (integracaoAtiva && fk_sistema) {
      const activeConflicts = chamadosCliente.filter(ch => ch.integracaoAtiva && ch.fk_sistema && ch.fk_sistema !== fk_sistema);
      if (activeConflicts.length > 0) {
        const sysNames = [...new Set(activeConflicts.map(ch => sysById[ch.fk_sistema]?.nome || ch.fk_sistema))].join(', ');
        if (!confirm(`Atenção: já existe integração ativa com ${sysNames}. Deseja vincular também o novo sistema?`)) return;
      }
    }

    const novoChamado = {
      fk_cliente: codigo,
      numeroChamado: numero,
      analista,
      dataSolicitacao: dataSol,
      dataFinalizacao: dataFin || null,
      fk_sistema,
      tipoIntegracao,
      integracaoAtiva,
    };

    const newId = await dbAdd('chamados', novoChamado);
    novoChamado.id = newId;

    // Update client's fk_sistema if integration active
    // Always fetch fresh record to avoid stale `c` snapshot overwriting newer data
    if (integracaoAtiva && fk_sistema) {
      const freshCliente = await dbGet('clientes', codigo);
      if (freshCliente) {
        await dbPut('clientes', { ...freshCliente, fk_sistema, _manual_fk_sistema: true });
      }
    }

    chamadosCliente = [novoChamado, ...chamadosCliente];
    renderChamadosList();

    // Clear form
    overlay.querySelector('#ch-numero').value = '';
    overlay.querySelector('#ch-analista').value = '';
    overlay.querySelector('#ch-data-sol').value = '';
    overlay.querySelector('#ch-data-fin').value = '';
    overlay.querySelector('#ch-sistema').value = '';
    overlay.querySelector('#ch-tipo').value = '';
    overlay.querySelector('#ch-integracao').checked = false;

    toast('Chamado registrado.', 'success');
  });

  // Save lab editable fields
  overlay.querySelector('#save-lab').addEventListener('click', async () => {
    const updated = { ...c };
    // Save contatos array; keep legacy fields for backward compat reads
    updated.contatos = labContatos;
    updated.NomeContato = labContatos[0]?.nome || null;
    updated.Telefone    = labContatos[0]?.telefone || null;
    updated._manual_NomeContato = labContatos.length > 0;
    updated._manual_Telefone    = !!(labContatos[0]?.telefone);

    await dbPut('clientes', updated);
    await auditLog('Editou laboratório', `#${updated.Codigo} ${updated.NomeFantasia||updated.RazaoSocial||''}`);
    toast('Laboratório atualizado com sucesso.', 'success');
    closeModal();
    pages.laboratorios();
  });
}


// ===================== PAGE: REPRESENTANTES =====================
pages.representantes = async function() {
  updateTopbar('Representantes', 'Gestão de representantes comerciais', `<button class="btn" id="new-rep-btn">+ Novo Representante</button>`);

  const renderPage = async (search = '', filterSup = '') => {
    const [reps, clientes] = await Promise.all([dbAll('representantes'), dbAll('clientes')]);
    const sups = [...new Set(reps.map(r => r.supervisor).filter(Boolean))].sort();

    const repCount = {};
    for (const c of clientes) if (c.fk_representante) repCount[c.fk_representante] = (repCount[c.fk_representante] || 0) + 1;

    let filtered = reps.filter(r => {
      const ok = !search || r.nome.toLowerCase().includes(search.toLowerCase());
      const supOk = !filterSup || r.supervisor === filterSup;
      return ok && supOk;
    });

    const repContainer = document.getElementById('rep-list');
    if (!repContainer) return;

    const editable = canBtn('representantes', 'edit-btn');
    const renderRepRow = r => {
      const count = repCount[r.id] || 0;
      return `<tr>
        <td><strong>${r.nome}</strong></td>
        <td>${r.supervisor || '—'}</td>
        <td>${r.uf || '—'}</td>
        <td>${r.telefone || '—'}</td>
        <td>${r.email || '—'}</td>
        <td><span class="badge rep">${count} clientes</span></td>
        <td><div style="display:flex;gap:6px">
          ${editable ? `<button class="btn sm secondary" data-edit-rep="${r.id}">Editar</button>` : ''}
          ${(count === 0 && editable) ? `<button class="btn sm danger" data-del-rep="${r.id}">Excluir</button>` : ''}
        </div></td>
      </tr>`;
    };

    repContainer.innerHTML = filtered.length === 0
      ? `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">Nenhum representante encontrado</td></tr>`
      : filtered.map(renderRepRow).join('');

    // Sortable
    const thead = repContainer.closest('table')?.querySelector('thead');
    if (thead) makeSortable(thead, repContainer, filtered, [
      { getValue: r => r.nome },
      { getValue: r => r.supervisor || '' },
      { getValue: r => r.uf || '' },
      { getValue: r => r.telefone || '' },
      { getValue: r => r.email || '' },
      { getValue: r => repCount[r.id] || 0 },
    ], renderRepRow);

    // rebind events
    repContainer.querySelectorAll('[data-edit-rep]').forEach(btn => {
      btn.addEventListener('click', () => openRepModal(parseInt(btn.dataset.editRep), renderPage, search, filterSup));
    });
    repContainer.querySelectorAll('[data-del-rep]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (confirm('Excluir este representante?')) {
          await dbDelete('representantes', parseInt(btn.dataset.delRep));
          toast('Representante excluído.', 'info');
          renderPage(search, filterSup);
        }
      });
    });
  };

  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
        <input type="text" placeholder="Buscar por nome..." id="rep-search">
      </div>
      <select id="rep-sup-filter"><option value="">Todos os supervisores</option></select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th data-sort="0">Nome</th><th data-sort="1">Supervisor</th><th data-sort="2">UF</th><th data-sort="3">Telefone</th><th data-sort="4">E-mail</th><th data-sort="5">Clientes</th><th>Ações</th></tr></thead>
        <tbody id="rep-list"></tbody>
      </table>
    </div>
  `;

  await renderPage();

  const reps = await dbAll('representantes');
  const sups = [...new Set(reps.map(r => r.supervisor).filter(Boolean))].sort();
  const supSel = document.getElementById('rep-sup-filter');
  sups.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; supSel.appendChild(o); });

  document.getElementById('rep-search').addEventListener('input', e => renderPage(e.target.value, supSel.value));
  supSel.addEventListener('change', () => renderPage(document.getElementById('rep-search').value, supSel.value));
  document.getElementById('new-rep-btn').addEventListener('click', () => openRepModal(null, renderPage));
};

function openRepModal(id, refresh, search = '', filterSup = '') {
  dbGet('representantes', id).then(rep => {
    const isNew = !rep;
    rep = rep || { nome: '', supervisor: '', uf: '', telefone: '', email: '' };
    const overlay = openModal(`
      <div class="modal-header">
        <div class="modal-title">${isNew ? 'Novo Representante' : 'Editar Representante'}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="field-group"><div class="field-label">Nome *</div><input type="text" id="rep-nome" value="${rep.nome}"></div>
        <div class="field-group"><div class="field-label">Supervisor</div><input type="text" id="rep-sup" value="${rep.supervisor || ''}"></div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">UF</div><input type="text" id="rep-uf" value="${rep.uf || ''}" maxlength="2"></div>
          <div class="field-group"><div class="field-label">Telefone</div><input type="tel" id="rep-tel" value="${rep.telefone || ''}"></div>
        </div>
        <div class="field-group"><div class="field-label">E-mail</div><input type="email" id="rep-email" value="${rep.email || ''}"></div>
      </div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="save-rep">Salvar</button>
      </div>
    `);
    overlay.querySelector('#save-rep').addEventListener('click', async () => {
      const nome = overlay.querySelector('#rep-nome').value.trim();
      if (!nome) { toast('Nome obrigatório.', 'error'); return; }
      const data = {
        nome,
        supervisor: normalizeSupervisor(overlay.querySelector('#rep-sup').value.trim()),
        uf: overlay.querySelector('#rep-uf').value.trim().toUpperCase(),
        telefone: overlay.querySelector('#rep-tel').value.trim(),
        email: overlay.querySelector('#rep-email').value.trim(),
      };
      if (!isNew) data.id = id;
      await (isNew ? dbAdd : dbPut)('representantes', data);
      await auditLog(isNew?'Criou representante':'Editou representante', data.nome);
      toast(isNew ? 'Representante criado.' : 'Representante atualizado.', 'success');
      closeModal();
      refresh(search, filterSup);
    });
  });
}

pages.assessores = async function() {
  updateTopbar('Assessores', 'Gestão de assessores do Programa Esmeralda e Chivor', '');

  const [assessoresDB, clientes] = await Promise.all([dbAll('assessores'), dbAll('clientes')]);

  // Contagem de clientes e categorias por assessor (nome como chave)
  const assCount  = {}; // total
  const assEsm    = {}; // Esmeralda
  const assChivor = {}; // Chivor
  for (const c of clientes) {
    const a = c.assessor;
    if (!a) continue;
    assCount[a]  = (assCount[a]  || 0) + 1;
    if (c.categoria_especial === 'Esmeralda') assEsm[a]   = (assEsm[a]   || 0) + 1;
    if (c.categoria_especial === 'Chivor')    assChivor[a] = (assChivor[a] || 0) + 1;
  }

  // União: assessores na store + nomes que aparecem em clientes mas ainda não na store
  const nomesNaStore     = new Set(assessoresDB.map(a => a.nome));
  const nomesEmClientes  = [...new Set(clientes.map(c => c.assessor).filter(Boolean))];
  const todosNomes       = [...new Set([...nomesNaStore, ...nomesEmClientes])].sort((a, b) => a.localeCompare(b, 'pt-BR'));

  let selectedAssessor = null;

  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

      <!-- Lista de assessores -->
      <div>
        <div class="toolbar" style="margin-bottom:10px">
          <div class="search-wrap">
            <span class="search-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </span>
            <input type="text" placeholder="Buscar assessor..." id="ass-search">
          </div>
          <select id="ass-cat-filter" style="font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2)">
            <option value="">Todos os programas</option>
            <option value="Esmeralda">💎 Esmeralda</option>
            <option value="Chivor">💜 Chivor</option>
          </select>
        </div>

        <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
          <div class="metric accent">
            <div class="metric-label">Assessores</div>
            <div class="metric-val">${todosNomes.length}</div>
            <div class="metric-sub">Cadastrados</div>
          </div>
          <div class="metric green">
            <div class="metric-label">💎 Esmeralda</div>
            <div class="metric-val">${Object.values(assEsm).reduce((s,v)=>s+v,0)}</div>
            <div class="metric-sub">Clientes</div>
          </div>
          <div class="metric purple">
            <div class="metric-label">💜 Chivor</div>
            <div class="metric-val">${Object.values(assChivor).reduce((s,v)=>s+v,0)}</div>
            <div class="metric-sub">Clientes</div>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Assessor</th>
                <th style="text-align:center">Total</th>
                <th style="text-align:center">Esmeralda</th>
                <th style="text-align:center">Chivor</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="ass-list"></tbody>
          </table>
        </div>
      </div>

      <!-- Painel de detalhe do assessor selecionado -->
      <div id="ass-detail-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="chart-title" id="ass-detail-title" style="margin:0">Selecione um assessor</div>
          <div id="ass-cat-toggle" style="display:none;display:flex;gap:6px">
            <button class="btn sm secondary active" id="ass-cat-all"  onclick="window._assFilter('all')">Todos</button>
            <button class="btn sm secondary"        id="ass-cat-esm"  onclick="window._assFilter('Esmeralda')">💎 Esmeralda</button>
            <button class="btn sm secondary"        id="ass-cat-chiv" onclick="window._assFilter('Chivor')">💜 Chivor</button>
          </div>
        </div>

        <div class="table-wrap">
          <table style="width:100%">
            <thead>
              <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>UF</th>
                <th>Programa</th>
              </tr>
            </thead>
            <tbody id="ass-detail">
              <tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text3)">—</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  `;

  // ── Render da lista de assessores ──
  function renderList() {
    const search  = (document.getElementById('ass-search')?.value  || '').toLowerCase();
    const catFilter = document.getElementById('ass-cat-filter')?.value || '';

    const filtered = todosNomes.filter(nome => {
      if (search && !nome.toLowerCase().includes(search)) return false;
      if (catFilter === 'Esmeralda' && !(assEsm[nome]   > 0)) return false;
      if (catFilter === 'Chivor'    && !(assChivor[nome] > 0)) return false;
      return true;
    });

    const tbody = document.getElementById('ass-list');
    if (!tbody) return;

    tbody.innerHTML = filtered.length === 0
      ? `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text3)">Nenhum assessor encontrado</td></tr>`
      : filtered.map(nome => {
          const tot  = assCount[nome]  || 0;
          const esm  = assEsm[nome]    || 0;
          const chiv = assChivor[nome] || 0;
          const isActive = selectedAssessor === nome;
          return `<tr style="${isActive ? 'background:rgba(15,155,148,.07);' : ''}cursor:pointer">
            <td><strong style="color:var(--text)">${nome}</strong></td>
            <td style="text-align:center">
              <span class="badge rep">${tot}</span>
            </td>
            <td style="text-align:center">
              <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(15,155,148,.1);color:var(--accent2);font-weight:600">${esm || '—'}</span>
            </td>
            <td style="text-align:center">
              <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(108,92,231,.1);color:var(--purple);font-weight:600">${chiv || '—'}</span>
            </td>
            <td>
              <button class="btn sm secondary" data-view-ass="${nome}">Ver clientes</button>
            </td>
          </tr>`;
        }).join('');

    tbody.querySelectorAll('[data-view-ass]').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedAssessor = btn.dataset.viewAss;
        renderList(); // re-render para highlight
        renderDetail(btn.dataset.viewAss, '');
      });
    });
  }

  // ── Render do painel de detalhe ──
  let _detailAssessor = null;
  let _detailFilter   = 'all';

  function renderDetail(nome, catFilter) {
    _detailAssessor = nome;
    _detailFilter   = catFilter || 'all';

    document.getElementById('ass-detail-title').textContent =
      `${nome} — ${assCount[nome] || 0} cliente(s)`;

    // Toggle buttons de categoria
    const toggle = document.getElementById('ass-cat-toggle');
    if (toggle) toggle.style.display = 'flex';
    ['all','Esmeralda','Chivor'].forEach(k => {
      const el = document.getElementById(`ass-cat-${k==='all'?'all':k==='Esmeralda'?'esm':'chiv'}`);
      if (el) el.classList.toggle('active', _detailFilter === k);
    });

    let lista = clientes.filter(c => c.assessor === nome);
    if (_detailFilter === 'Esmeralda') lista = lista.filter(c => c.categoria_especial === 'Esmeralda');
    if (_detailFilter === 'Chivor')    lista = lista.filter(c => c.categoria_especial === 'Chivor');
    lista = lista.sort((a, b) =>
      (a.NomeFantasia || a.RazaoSocial || '').localeCompare(b.NomeFantasia || b.RazaoSocial || '', 'pt-BR'));

    const tbody = document.getElementById('ass-detail');
    if (!tbody) return;

    tbody.innerHTML = lista.length === 0
      ? `<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text3)">Nenhum cliente nesta categoria.</td></tr>`
      : lista.map(c => {
          const catColor = c.categoria_especial === 'Esmeralda'
            ? 'rgba(15,155,148,.1);color:var(--accent2);border:1px solid rgba(15,155,148,.25)'
            : 'rgba(108,92,231,.1);color:var(--purple);border:1px solid rgba(108,92,231,.25)';
          return `<tr>
            <td>
              <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${c.Codigo}</span>
            </td>
            <td>
              <strong style="color:var(--text)">${c.NomeFantasia || c.RazaoSocial || '—'}</strong>
              ${c.Grupo ? `<div style="font-size:10px;color:var(--text3)">${c.Grupo}</div>` : ''}
            </td>
            <td>
              <span class="badge uf">${c.UF || '?'}</span>
            </td>
            <td>
              ${c.categoria_especial
                ? programaBadge(c.categoria_especial)
                : '<span style="color:var(--text3);font-size:11px">—</span>'}
            </td>
          </tr>`;
        }).join('');
  }

  // Expõe filtro de categoria do detalhe globalmente (botões chamam window._assFilter)
  window._assFilter = function(cat) {
    if (_detailAssessor) renderDetail(_detailAssessor, cat);
  };

  // Wire eventos
  document.getElementById('ass-search').addEventListener('input', renderList);
  document.getElementById('ass-cat-filter').addEventListener('change', renderList);

  renderList();
};

pages.analistas = async function() {
  updateTopbar('Analistas', 'Gestão de analistas de implantação', `<button class="btn" id="new-ana-btn">+ Novo Analista</button>`);

  const renderAnalistas = async (search = '') => {
    const [analistas, chamados] = await Promise.all([dbAll('analistas'), dbAll('chamados')]);

    const chamCount = {};
    for (const ch of chamados) {
      if (ch.analista) chamCount[ch.analista] = (chamCount[ch.analista] || 0) + 1;
    }

    const showInativos = document.getElementById('ana-show-inativos')?.checked ?? false;
    let filtered = analistas.filter(a => {
      const matchSearch = !search || a.nome.toLowerCase().includes(search.toLowerCase()) ||
        (a.cargo || '').toLowerCase().includes(search.toLowerCase()) ||
        String(a.id || '').toLowerCase().includes(search.toLowerCase());
      const matchAtivo = showInativos || a.ativo !== false;
      return matchSearch && matchAtivo;
    });

    const tbody = document.getElementById('ana-list');
    if (!tbody) return;

    const editable = canBtn('analistas', 'edit-btn');
    const cargoColor = { 'Analista Junior':'var(--text2)', 'Analista Pleno':'var(--accent2)', 'Analista Sênior':'var(--navy)' };
    const renderAnaRow = a => {
      const count = chamCount[a.nome] || 0;
      const ativo = a.ativo !== false;
      return `<tr style="${!ativo ? 'opacity:.55' : ''}">
        <td><span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent2);background:rgba(15,155,148,.08);padding:2px 7px;border-radius:4px;border:1px solid rgba(15,155,148,.2)">${a.id}</span></td>
        <td>
          <strong style="color:var(--navy)">${a.nome}</strong>
          ${!ativo ? '<span style="font-size:10px;color:var(--text3);margin-left:6px">Inativo</span>' : ''}
        </td>
        <td><span style="font-size:11px;font-weight:600;color:${cargoColor[a.cargo]||'var(--text2)'};padding:2px 8px;background:rgba(0,0,0,.04);border-radius:10px">${a.cargo || '—'}</span></td>
        <td style="color:var(--text2)">${a.email || '—'}</td>
        <td><span class="badge rep">${count} chamados</span></td>
        <td><div style="display:flex;gap:6px">
          <button class="btn sm secondary" data-view-ana="${a.id}">Ver</button>
          ${editable ? `<button class="btn sm secondary" data-edit-ana="${a.id}">Editar</button>` : ''}
          ${(count === 0 && editable) ? `<button class="btn sm danger" data-del-ana="${a.id}">Excluir</button>` : ''}
        </div></td>
      </tr>`;
    };

    tbody.innerHTML = filtered.length === 0
      ? `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Nenhum analista cadastrado. Clique em "+ Novo Analista" para adicionar.</td></tr>`
      : filtered.map(renderAnaRow).join('');

    const thead = tbody.closest('table')?.querySelector('thead');
    if (thead) makeSortable(thead, tbody, filtered, [
      { getValue: a => a.id },
      { getValue: a => a.nome },
      { getValue: a => a.cargo || '' },
      { getValue: a => a.email || '' },
      { getValue: a => chamCount[a.nome] || 0 },
    ], renderAnaRow);

    tbody.querySelectorAll('[data-view-ana]').forEach(btn => {
      btn.addEventListener('click', () => openAnalistaViewModal(btn.dataset.viewAna));
    });
    tbody.querySelectorAll('[data-edit-ana]').forEach(btn => {
      btn.addEventListener('click', async () => {
        // Resolve a chave correta (string nova ou numérica legada)
        const keyStr = btn.dataset.editAna;
        const keyNum = Number(keyStr);
        let resolvedKey = keyStr;
        try {
          const r = await dbGet('analistas', keyStr);
          if (!r && !isNaN(keyNum)) resolvedKey = keyNum;
        } catch(_) {
          if (!isNaN(keyNum)) resolvedKey = keyNum;
        }
        openAnalistaModal(resolvedKey, renderAnalistas, search);
      });
    });
    tbody.querySelectorAll('[data-del-ana]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Excluir este analista?')) return;
        // Tenta a chave como veio no dataset (string ou número legado)
        const keyStr = btn.dataset.delAna;
        const keyNum = Number(keyStr);
        try {
          // Verifica qual chave realmente existe no banco
          let record = null;
          try { record = await dbGet('analistas', keyStr); } catch(_) {}
          if (!record && !isNaN(keyNum)) {
            try { record = await dbGet('analistas', keyNum); } catch(_) {}
            if (record) await dbDelete('analistas', keyNum);
            else await dbDelete('analistas', keyStr);
          } else {
            await dbDelete('analistas', keyStr);
          }
          toast('Analista excluído.', 'info');
          renderAnalistas(document.getElementById('ana-search')?.value || '');
        } catch(err) {
          toast('Erro ao excluir: ' + (err.message || err), 'error');
        }
      });
    });
  };

  document.getElementById('content').innerHTML = `
    <div class="toolbar" style="gap:10px;align-items:center">
      <div class="search-wrap" style="flex:1">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
        <input type="text" placeholder="Buscar por ID, nome ou cargo..." id="ana-search">
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);white-space:nowrap;cursor:pointer">
