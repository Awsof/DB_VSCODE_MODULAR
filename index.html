        Exibir inativos
      </label>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th data-sort="0">ID</th><th data-sort="1">Nome</th><th data-sort="2">Cargo</th><th data-sort="3">E-mail</th><th data-sort="4">Chamados</th><th>Ações</th></tr></thead>
        <tbody id="ana-list"></tbody>
      </table>
    </div>
  `;

  await renderAnalistas();
  document.getElementById('ana-search').addEventListener('input', e => renderAnalistas(e.target.value));
  document.getElementById('ana-show-inativos').addEventListener('change', () => renderAnalistas(document.getElementById('ana-search').value));
  document.getElementById('new-ana-btn').addEventListener('click', () => openAnalistaModal(null, renderAnalistas));
};

const CARGOS_ANALISTA = ['Analista Junior', 'Analista Pleno', 'Analista Sênior'];

function openAnalistaModal(id, refresh, search = '') {
  Promise.resolve(id !== null && id !== undefined ? (async () => {
    let rec = null;
    try { rec = await dbGet('analistas', id); } catch(_) {}
    // Fallback: se veio string mas o registro tem chave numérica (legado)
    if (!rec && !isNaN(Number(id))) {
      try { rec = await dbGet('analistas', Number(id)); } catch(_) {}
    }
    return rec;
  })() : Promise.resolve(null)).then(async ana => {
    const isNew = !ana;
    ana = ana || { id:'', nome:'', cargo:'Analista Pleno', email:'', ativo: true };

    const overlay = openModal(`
      <div class="modal-header">
        <div class="modal-title">${isNew ? 'Novo Analista' : 'Editar Analista'}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="two-col">
          <div class="field-group">
            <div class="field-label">ID * <span style="font-size:10px;color:var(--text3);font-weight:400">(único, imutável após salvar)</span></div>
            <input type="text" id="ana-id" value="${isNew ? '' : ana.id}"
              ${!isNew ? 'readonly style="opacity:.6;background:var(--bg2)"' : ''}
              placeholder="Ex: ANA-01">
          </div>
          <div class="field-group">
            <div class="field-label">Nome *</div>
            <input type="text" id="ana-nome" value="${ana.nome}" placeholder="Nome completo">
          </div>
        </div>
        <div class="two-col">
          <div class="field-group">
            <div class="field-label">Cargo *</div>
            <select id="ana-cargo">
              ${CARGOS_ANALISTA.map(c => `<option value="${c}" ${c === ana.cargo ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="field-group">
            <div class="field-label">E-mail</div>
            <input type="email" id="ana-email" value="${ana.email || ''}" placeholder="email@exemplo.com">
          </div>
        </div>
        <div class="checkbox-row" style="margin-top:6px">
          <input type="checkbox" id="ana-ativo" ${ana.ativo !== false ? 'checked' : ''}>
          <label for="ana-ativo" style="font-size:13px;cursor:pointer">
            Analista ativo <span style="font-size:11px;color:var(--text3)">(desmarque para inativar sem excluir)</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="save-ana">Salvar</button>
      </div>
    `);

    overlay.querySelector('#save-ana').addEventListener('click', async () => {
      const anaId   = overlay.querySelector('#ana-id').value.trim();
      const nome    = overlay.querySelector('#ana-nome').value.trim();
      const cargo   = overlay.querySelector('#ana-cargo').value;
      const email   = overlay.querySelector('#ana-email').value.trim();
      const ativo   = overlay.querySelector('#ana-ativo').checked;

      if (!anaId) { toast('ID obrigatório.', 'error'); return; }
      if (!nome)  { toast('Nome obrigatório.', 'error'); return; }

      // Verificar unicidade do ID apenas em novos registros
      if (isNew) {
        try {
          const existing = await dbGet('analistas', anaId);
          if (existing) { toast(`ID "${anaId}" já está em uso. Escolha outro.`, 'error'); return; }
        } catch(_) {} // ID não existe → ok
      }

      const data = { id: anaId, nome, cargo, email, ativo };
      await dbPut('analistas', data);
      await auditLog(isNew ? 'Criou analista' : 'Editou analista', `[${anaId}] ${nome} · ${cargo}`);
      toast(isNew ? 'Analista criado.' : 'Analista atualizado.', 'success');
      closeModal();
      refresh(search);
    });
  });
}

// ===================== SISTEMA — MODAL VER =====================
async function openSysViewModal(id, sysClientCount) {
  const [sys, allClientes, chamados] = await Promise.all([
    dbGet('sistemas', id), dbAll('clientes'), dbAll('chamados')
  ]);
  if (!sys) return;

  const tiposArr  = Array.isArray(sys.tipoIntegracao) ? sys.tipoIntegracao : (sys.tipoIntegracao ? [sys.tipoIntegracao] : []);
  const configArr = Array.isArray(sys.configuracao)   ? sys.configuracao   : (sys.configuracao   ? [sys.configuracao]   : []);
  const contatos  = Array.isArray(sys.contatos)       ? sys.contatos       : (sys.contatoNome ? [{nome:sys.contatoNome, cargo:sys.contatoCargo||'', telefone:sys.contatoTelefone||'', email:sys.contatoEmail||''}] : []);

  const vinculados = allClientes.filter(c => c.fk_sistema === id);
  const vinc = sysClientCount?.[id] ?? vinculados.length;

  const row = (l, v) => `<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
    <span style="color:var(--text3);min-width:130px;font-weight:500">${l}</span>
    <span style="color:var(--text)">${v}</span>
  </div>`;

  openModal(`
    <div class="modal-header">
      <div class="modal-title">
        <span style="font-family:var(--mono);font-size:12px;color:var(--accent2);margin-right:8px">${sys.codigoSistema||''}</span>
        ${sys.nome}
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      ${row('Empresa', sys.empresa || '—')}
      ${row('Tipo Integração', tiposArr.length ? tiposArr.map(t=>`<span class="badge sys" style="font-size:11px">${t}</span>`).join(' ') : '—')}
      ${row('Configuração', configArr.length ? configArr.map(c=>`<span class="badge tag" style="font-size:11px">${c}</span>`).join(' ') : '—')}
      ${row('Métodos', sys.metodos?.length ? sys.metodos.map(m=>`<span class="badge tag" style="font-size:11px">${m}</span>`).join(' ') : '—')}
      ${row('Laboratórios vinculados', `<strong style="color:var(--accent2)">${vinc}</strong>`)}
      ${sys.propostaHabilitada ? row('Proposta', `R$ ${Number(sys.valorProposta||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`) : ''}
      ${sys.mensalidadeHabilitada ? row('Mensalidade', `R$ ${Number(sys.valorMensalidade||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}/mês`) : ''}
      ${sys.observacoes ? row('Observações', `<span style="color:var(--text2)">${sys.observacoes}</span>`) : ''}

      ${contatos.length ? `
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin:14px 0 8px">Contatos</div>
        ${contatos.map(ct => `
          <div style="padding:8px;background:var(--bg2);border-radius:var(--r);margin-bottom:6px;font-size:12px">
            <div style="font-weight:600;color:var(--navy)">${ct.nome}${ct.cargo?` <span style="font-weight:400;color:var(--text3)">· ${ct.cargo}</span>`:''}</div>
            ${ct.telefone?`<div style="color:var(--text2)">${ct.telefone}</div>`:''}
            ${ct.email?`<div style="color:var(--text2)">${ct.email}</div>`:''}
          </div>`).join('')}` : ''}
    </div>
    <div class="modal-footer">
      ${canBtn('sistemas','edit-btn') ? `<button class="btn secondary" onclick="closeModal();openSysModal(${id},()=>navigate('sistemas'))">Editar</button>` : ''}
      <button class="btn" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

// ===================== ANALISTA — MODAL VER =====================
async function openAnalistaViewModal(anaId) {
  // Resolve chave (string ou numérica legada)
  let ana = null;
  try { ana = await dbGet('analistas', anaId); } catch(_) {}
  if (!ana && !isNaN(Number(anaId))) {
    try { ana = await dbGet('analistas', Number(anaId)); } catch(_) {}
  }
  if (!ana) return;

  const [chamados, clientes] = await Promise.all([dbAll('chamados'), dbAll('clientes')]);
  const clienteByCode = {}; for (const c of clientes) clienteByCode[c.Codigo] = c;

  // Chamados deste analista — considera apenas o chamado mais recente por cliente
  const meusChamados = chamados.filter(ch => ch.analista === ana.nome);

  // Para cada cliente, pega apenas o chamado com data de solicitação mais recente
  const ultimoPorCliente = {};
  for (const ch of meusChamados) {
    const cod = ch.fk_cliente;
    if (!cod) continue;
    const prev = ultimoPorCliente[cod];
    const dtCh  = ch.dataSolicitacao || '';
    const dtPrev = prev?.dataSolicitacao || '';
    if (!prev || dtCh > dtPrev) ultimoPorCliente[cod] = ch;
  }

  // Classifica por status do chamado mais recente de cada cliente
  const integrados   = [];
  const implantacao  = [];
  const inativados   = [];

  for (const ch of Object.values(ultimoPorCliente)) {
    const cli = clienteByCode[ch.fk_cliente];
    const nome = cli ? (cli.NomeFantasia || cli.RazaoSocial || `Cód. ${ch.fk_cliente}`) : `Cód. ${ch.fk_cliente}`;
    const item = { nome, codigo: ch.fk_cliente, chamado: ch.numeroChamado || ch.id, data: ch.dataSolicitacao };

    if (ch.integracaoAtiva) integrados.push(item);
    else if (ch.dataFinalizacao) inativados.push(item);
    else implantacao.push(item);
  }

  const secao = (titulo, cor, lista) => lista.length === 0 ? '' : `
    <div style="margin-top:14px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${cor};margin-bottom:6px">${titulo} (${lista.length})</div>
      <div style="max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)">
        <table style="width:100%;font-size:12px">
          <thead><tr style="background:var(--bg2)">
            <th style="padding:5px 8px;text-align:left;font-weight:600;color:var(--text3)">Cód.</th>
            <th style="padding:5px 8px;text-align:left;font-weight:600;color:var(--text3)">Cliente</th>
            <th style="padding:5px 8px;text-align:left;font-weight:600;color:var(--text3)">Chamado</th>
            <th style="padding:5px 8px;text-align:left;font-weight:600;color:var(--text3)">Data</th>
          </tr></thead>
          <tbody>
            ${lista.map(it => `<tr style="border-top:1px solid var(--border)">
              <td style="padding:5px 8px;font-family:var(--mono);color:var(--text3)">${it.codigo}</td>
              <td style="padding:5px 8px;font-weight:500;color:var(--navy)">${it.nome}</td>
              <td style="padding:5px 8px;color:var(--text2)">${it.chamado}</td>
              <td style="padding:5px 8px;color:var(--text3)">${it.data ? it.data.slice(0,10) : '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  const cargoColor = { 'Analista Junior':'var(--text2)', 'Analista Pleno':'var(--accent2)', 'Analista Sênior':'var(--navy)' };

  openModal(`
    <div class="modal-header">
      <div class="modal-title">
        <span style="font-family:var(--mono);font-size:11px;color:var(--accent2);margin-right:8px">[${ana.id}]</span>
        ${ana.nome}
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:12px;align-items:center;padding:10px;background:var(--bg2);border-radius:var(--r);margin-bottom:4px">
        <div>
          <span style="font-size:12px;font-weight:700;color:${cargoColor[ana.cargo]||'var(--text2)'};padding:2px 10px;background:rgba(0,0,0,.05);border-radius:10px">${ana.cargo||'—'}</span>
          ${ana.ativo===false ? '<span style="font-size:11px;color:var(--text3);margin-left:8px">· Inativo</span>' : '<span style="font-size:11px;color:var(--accent2);margin-left:8px">· Ativo</span>'}
        </div>
        ${ana.email ? `<a href="mailto:${ana.email}" style="font-size:12px;color:var(--accent2)">${ana.email}</a>` : ''}
      </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0">
        <div style="padding:10px;background:rgba(15,155,148,.07);border-radius:var(--r);text-align:center;border:1px solid rgba(15,155,148,.2)">
          <div style="font-size:22px;font-weight:700;color:var(--accent2)">${integrados.length}</div>
          <div style="font-size:11px;color:var(--text3)">Integrados</div>
        </div>
        <div style="padding:10px;background:rgba(196,155,60,.07);border-radius:var(--r);text-align:center;border:1px solid rgba(196,155,60,.25)">
          <div style="font-size:22px;font-weight:700;color:var(--gold)">${implantacao.length}</div>
          <div style="font-size:11px;color:var(--text3)">Em Implantação</div>
        </div>
        <div style="padding:10px;background:rgba(232,88,88,.07);border-radius:var(--r);text-align:center;border:1px solid rgba(232,88,88,.2)">
          <div style="font-size:22px;font-weight:700;color:var(--red)">${inativados.length}</div>
          <div style="font-size:11px;color:var(--text3)">Inativados</div>
        </div>
      </div>

      ${secao('Integrados', 'var(--accent2)', integrados)}
      ${secao('Em Implantação', 'var(--gold)', implantacao)}
      ${secao('Inativados', 'var(--red)', inativados)}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

// ===================== SISTEMA — MODAL EDITAR =====================
function openSysModal(id, refresh, search = '', filterTipo = '') {
  Promise.resolve(id ? dbGet('sistemas', id) : null).then(sys => {
    const isNew = !sys;

    sys = sys || {};
    const defTipos   = Array.isArray(sys.tipoIntegracao) ? sys.tipoIntegracao : (sys.tipoIntegracao ? [sys.tipoIntegracao] : []);
    const defConfigs = Array.isArray(sys.configuracao)   ? sys.configuracao   : (sys.configuracao   ? [sys.configuracao]   : []);
    // Coerce contatos to array (backward compat with single-contato records)
    let contatos = Array.isArray(sys.contatos) ? [...sys.contatos]
      : (sys.contatoNome ? [{ nome: sys.contatoNome, cargo: sys.contatoCargo||'', telefone: sys.contatoTelefone||'', email: sys.contatoEmail||'' }] : []);

    const TIPOS_OPTS  = ['Convencional', 'Webservice', 'Etiqueta Primária'];
    const CONFIG_OPTS = ['Softhouse', 'Grupo DB', 'Treinamento Cliente'];

    const renderChecks = (opts, selected, prefix) =>
      opts.map(o => `
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;padding:4px 0">
          <input type="checkbox" name="${prefix}" value="${o}" ${selected.includes(o)?'checked':''} style="width:14px;height:14px;accent-color:var(--accent)">
          ${o}
        </label>`).join('');

    function renderContatosList(container) {
      if (!container) return;
      container.innerHTML = contatos.length === 0
        ? `<div style="font-size:12px;color:var(--text3);padding:4px 0">Nenhum contato cadastrado.</div>`
        : contatos.map((ct, i) => `
          <div class="contato-item">
            <div class="contato-info">
              <div class="contato-nome">${ct.nome || '—'}${ct.cargo ? ' · <span style="font-weight:400;color:var(--text2)">' + ct.cargo + '</span>' : ''}</div>
              <div class="contato-meta">${[ct.telefone, ct.email].filter(Boolean).join(' · ') || '—'}</div>
            </div>
            <button class="contato-del" data-del-ct="${i}" title="Remover contato">×</button>
          </div>`).join('');

      container.querySelectorAll('[data-del-ct]').forEach(btn => {
        btn.addEventListener('click', () => {
          contatos.splice(parseInt(btn.dataset.delCt), 1);
          renderContatosList(container);
        });
      });
    }

    const overlay = openModal(`
      <div class="modal-header">
        <div class="modal-title">${isNew ? 'Novo Sistema' : 'Editar Sistema'}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="two-col">
          <div class="field-group">
            <div class="field-label">Código do Sistema *
              <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">
                ${isNew ? '(único, imutável após salvar)' : '(não pode ser alterado)'}
              </span>
            </div>
            <input type="text" id="sys-codigo"
              value="${sys.codigoSistema||''}"
              ${!isNew ? 'readonly style="opacity:.6;font-family:var(--mono)"' : 'placeholder="Ex: LIS-001, TOTVS-02..."'}
              style="font-family:var(--mono);font-weight:600">
          </div>
          <div class="field-group"><div class="field-label">Nome do Sistema *</div><input type="text" id="sys-nome" value="${sys.nome||''}"></div>
        </div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Empresa</div><input type="text" id="sys-empresa" value="${sys.empresa||''}"></div>
        </div>
        <div class="two-col">
          <div class="field-group">
            <div class="field-label">Tipo de Integração <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">(múltipla escolha)</span></div>
            <div class="multi-check-group" id="tipos-wrap">${renderChecks(TIPOS_OPTS, defTipos, 'tipo-int')}</div>
          </div>
          <div class="field-group">
            <div class="field-label">Configuração <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">(múltipla escolha)</span></div>
            <div class="multi-check-group" id="configs-wrap">${renderChecks(CONFIG_OPTS, defConfigs, 'config-opt')}</div>
          </div>
        </div>

        <div class="section-divider">Contatos</div>
        <div id="sys-contatos-list" style="margin-bottom:8px"></div>
        <div class="contato-add-form">
          <div class="field-label" style="margin-bottom:8px">Adicionar Contato</div>
          <div class="two-col" style="margin-bottom:8px">
            <div class="field-group" style="margin:0"><div class="field-label">Nome</div><input type="text" id="ct-nome" placeholder="Nome completo"></div>
            <div class="field-group" style="margin:0"><div class="field-label">Cargo</div><input type="text" id="ct-cargo" placeholder="Cargo / função"></div>
          </div>
          <div class="two-col" style="margin-bottom:8px">
            <div class="field-group" style="margin:0"><div class="field-label">Telefone</div><input type="tel" id="ct-tel" placeholder="(00) 00000-0000"></div>
            <div class="field-group" style="margin:0"><div class="field-label">E-mail</div><input type="email" id="ct-email" placeholder="email@exemplo.com"></div>
          </div>
          <button class="btn secondary" id="add-ct-btn" style="width:100%">+ Adicionar Contato</button>
        </div>

        <div class="section-divider">Métodos Desenvolvidos</div>
        <div class="field-group">
          <div class="tags-wrap" id="metodos-tags">${(sys.metodos||[]).map(m=>`<span class="badge tag" data-m="${m}">${m} <span style="cursor:pointer;margin-left:4px" onclick="this.parentElement.remove()">×</span></span>`).join('')}</div>
          <div class="tag-input-wrap">
            <input type="text" id="metodo-input" placeholder="Digitar método e pressionar Enter...">
            <button class="btn secondary" id="add-metodo-btn">Add</button>
          </div>
        </div>

        <div class="section-divider">Observações</div>
        <div class="field-group">
          <textarea id="sys-obs" rows="3" placeholder="Observações livres sobre o sistema...">${sys.observacoes||''}</textarea>
        </div>

        <div class="section-divider">Financeiro</div>
        <div class="checkbox-row">
          <input type="checkbox" id="prop-check" ${sys.propostaHabilitada?'checked':''}>
          <label for="prop-check" style="font-size:13px;cursor:pointer">Habilitar Proposta</label>
        </div>
        <div id="prop-val-wrap" class="${sys.propostaHabilitada?'':'hidden'}" style="margin-bottom:12px">
          <div class="field-label">Valor da Proposta (R$)</div>
          <input type="number" id="sys-prop-val" value="${sys.valorProposta||0}" min="0" step="0.01">
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="mens-check" ${sys.mensalidadeHabilitada?'checked':''}>
          <label for="mens-check" style="font-size:13px;cursor:pointer">Habilitar Mensalidade</label>
        </div>
        <div id="mens-val-wrap" class="${sys.mensalidadeHabilitada?'':'hidden'}">
          <div class="field-label">Valor da Mensalidade (R$)</div>
          <input type="number" id="sys-mens-val" value="${sys.valorMensalidade||0}" min="0" step="0.01">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="save-sys">Salvar</button>
      </div>
    `);

    renderContatosList(overlay.querySelector('#sys-contatos-list'));

    overlay.querySelector('#add-ct-btn').addEventListener('click', () => {
      const nome = overlay.querySelector('#ct-nome').value.trim();
      if (!nome) { toast('Informe ao menos o nome do contato.', 'error'); return; }
      contatos.push({
        nome,
        cargo:    overlay.querySelector('#ct-cargo').value.trim(),
        telefone: overlay.querySelector('#ct-tel').value.trim(),
        email:    overlay.querySelector('#ct-email').value.trim(),
      });
      renderContatosList(overlay.querySelector('#sys-contatos-list'));
      overlay.querySelector('#ct-nome').value = '';
      overlay.querySelector('#ct-cargo').value = '';
      overlay.querySelector('#ct-tel').value = '';
      overlay.querySelector('#ct-email').value = '';
      overlay.querySelector('#ct-nome').focus();
    });

    const addMetodo = () => {
      const inp = overlay.querySelector('#metodo-input');
      const val = inp.value.trim();
      if (!val) return;
      const tag = document.createElement('span');
      tag.className = 'badge tag';
      tag.dataset.m = val;
      tag.innerHTML = `${val} <span style="cursor:pointer;margin-left:4px">×</span>`;
      tag.querySelector('span').onclick = () => tag.remove();
      overlay.querySelector('#metodos-tags').appendChild(tag);
      inp.value = '';
      inp.focus();
    };
    overlay.querySelector('#metodo-input').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); addMetodo(); } });
    overlay.querySelector('#add-metodo-btn').addEventListener('click', addMetodo);
    overlay.querySelector('#prop-check').addEventListener('change', e => overlay.querySelector('#prop-val-wrap').classList.toggle('hidden', !e.target.checked));
    overlay.querySelector('#mens-check').addEventListener('change', e => overlay.querySelector('#mens-val-wrap').classList.toggle('hidden', !e.target.checked));

    overlay.querySelector('#save-sys').addEventListener('click', async () => {
      const codigoSistema = overlay.querySelector('#sys-codigo').value.trim().toUpperCase();
      const nome = overlay.querySelector('#sys-nome').value.trim();

      if (!codigoSistema) { toast('Código do Sistema obrigatório.', 'error'); return; }
      if (!nome)          { toast('Nome obrigatório.', 'error'); return; }

      // Validação de unicidade do código — só para registros novos
      if (isNew) {
        const todosSistemas = await dbAll('sistemas');
        const duplicado = todosSistemas.some(s => (s.codigoSistema||'').toUpperCase() === codigoSistema);
        if (duplicado) {
          toast(`Código "${codigoSistema}" já está em uso por outro sistema.`, 'error');
          return;
        }
      }

      const tipoIntegracao = [...overlay.querySelectorAll('input[name="tipo-int"]:checked')].map(el => el.value);
      const configuracao   = [...overlay.querySelectorAll('input[name="config-opt"]:checked')].map(el => el.value);
      const metodos        = [...overlay.querySelectorAll('#metodos-tags [data-m]')].map(el => el.dataset.m);

      const data = {
        codigoSistema,                                               // Imutável após criação
        nome,
        empresa:              overlay.querySelector('#sys-empresa').value.trim(),
        tipoIntegracao,
        configuracao,
        metodos,
        contatos,
        observacoes:          overlay.querySelector('#sys-obs').value.trim(),
        propostaHabilitada:   overlay.querySelector('#prop-check').checked,
        valorProposta:        parseFloat(overlay.querySelector('#sys-prop-val').value) || 0,
        mensalidadeHabilitada: overlay.querySelector('#mens-check').checked,
        valorMensalidade:     parseFloat(overlay.querySelector('#sys-mens-val').value) || 0,
      };
      if (!isNew) data.id = id;
      await (isNew ? dbAdd : dbPut)('sistemas', data);
      await auditLog(isNew?'Criou sistema':'Editou sistema', `${data.codigoSistema} · ${data.nome}`);
      toast(isNew ? 'Sistema criado.' : 'Sistema atualizado.', 'success');
      closeModal();
      refresh(search, filterTipo);
    });
  });
}

  function switchImportTab(tab) {
    currentImportTab = tab;
    document.getElementById('tab-g5').classList.toggle('active', tab === 'g5');
    document.getElementById('tab-envio').classList.toggle('active', tab === 'envio');
    document.getElementById('tab-esmeralda').classList.toggle('active', tab === 'esmeralda');

  async function handleFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xls','xlsx','csv'].includes(ext)) { toast('Formato inválido. Use .xls, .xlsx ou .csv', 'error'); return; }

    document.getElementById('import-progress').classList.remove('hidden');
    document.getElementById('import-status').textContent = 'Lendo arquivo...';
    document.getElementById('prog-fill').style.width = '10%';

    try {
      const buf = await file.arrayBuffer();

      // ---- STREAMING CSV PARSER — chunks to avoid UI freeze on 1M+ row files ----
      if (ext === 'csv') {
        const text = new TextDecoder('utf-8').decode(buf);
        const nlIdx = text.indexOf('\n');
        const firstLine = nlIdx >= 0 ? text.slice(0, nlIdx) : text;
        const sep = firstLine.includes(';') ? ';' : ',';
        const headers = firstLine.split(sep).map(h => h.trim().replace(/^"|"$/g,''));

        const isEnvioBase = headers.includes('Envio') &&
          (headers.includes('Soma') || headers.includes('Qnt Envio') || headers.includes('QntEnvio'));

        document.getElementById('import-status').textContent = isEnvioBase
          ? 'Detectada Base de Envio — agregando...'
          : 'Detectada Base G5 — processando...';
        document.getElementById('prog-fill').style.width = '15%';

        if (currentImportTab === 'envio' || isEnvioBase) {
          // STREAMING aggregate — never allocate full row array
          const result = await processEnvioImportStreaming(text, sep, headers,
            (pct, msg) => {
              document.getElementById('prog-fill').style.width = pct + '%';
              document.getElementById('import-status').textContent = msg;
            });
          document.getElementById('prog-fill').style.width = '100%';
          document.getElementById('import-status').textContent =
            `Concluído! ${result.total} registros · ${result.clientes} clientes · período ${result.periodo}`;
          await auditLog('import', `Base de Envio: ${result.total} registros, ${result.clientes} clientes`);
          toast(`Base de envio importada: ${result.total} registros de ${result.clientes} clientes.`, 'success', 6000);
          setTimeout(() => pages.importacao(), 1500);
        } else {
          // G5 CSV — typically small, parse normally
          const lines = text.split('\n');
          const rows = [];
          for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim(); if (!line) continue;
            const vals = line.split(sep).map(v => v.trim().replace(/^"|"$/g,''));
            const obj = {}; headers.forEach((h, j) => { obj[h] = vals[j] ?? ''; }); rows.push(obj);
          }
          document.getElementById('import-status').textContent = `${rows.length} linhas encontradas. Processando...`;
          document.getElementById('prog-fill').style.width = '50%';
          const normalized = rows.map(r => {
            const n = {};
            for (const [k, v] of Object.entries(r)) n[k.trim()] = String(v).trim() === '' ? null : String(v).trim();
            return n;
          });
          const log = await processImport(normalized);
          document.getElementById('prog-fill').style.width = '100%';
          document.getElementById('import-status').textContent = `Concluído! ${log.novos.length} novos · ${log.alterados.length} alterados`;
          await auditLog('import', `Base G5 (CSV): ${log.novos.length} novos, ${log.alterados.length} alterados`);
          toast(`Importação concluída: ${log.novos.length} novos, ${log.alterados.length} atualizados.`, 'success', 6000);
          setTimeout(() => pages.importacao(), 1500);
        }
      } else {
        // XLS/XLSX
        const wb = XLSX.read(buf, { type: 'array' });

        // ── Detecção automática da Lista Esmeralda ──
        // A planilha tem header na linha 0 como dados (Unnamed) ou pode ter nome de aba específico.
        // Usa a primeira aba que contém as colunas canônicas após normalização.
        let esmeraldaRows = null;
        for (const sheetName of wb.SheetNames) {
          const ws = wb.Sheets[sheetName];
          const raw = XLSX.utils.sheet_to_json(ws, { defval: '', header: 1 });
          if (!raw.length) continue;
          // Encontrar linha de cabeçalho real (pode estar na linha 0 ou 1)
          let headerRowIdx = -1;
          for (let i = 0; i < Math.min(raw.length, 4); i++) {
            const row = raw[i].map(c => String(c||'').trim());
            if (row.some(c => c === 'Código' || c === 'CATEGORIA' || c === 'Assessor')) {
              headerRowIdx = i; break;
            }
          }
          if (headerRowIdx === -1) continue;
          const headers = raw[headerRowIdx].map(c => String(c||'').trim());
          const hasCodigo    = headers.includes('Código');
          const hasCategoria = headers.includes('CATEGORIA');
          const hasAssessor  = headers.includes('Assessor');
          if (hasCodigo && hasCategoria && hasAssessor) {
            esmeraldaRows = raw.slice(headerRowIdx + 1)
              .map(r => {
                const obj = {};
                headers.forEach((h, j) => { obj[h] = String(r[j]||'').trim() || null; });
                return obj;
              })
              .filter(r => r['Código'] && r['Código'] !== 'Código');
            break;
          }
        }

        if (currentImportTab === 'esmeralda' || esmeraldaRows) {
          if (!esmeraldaRows || !esmeraldaRows.length) {
            throw new Error('Nenhuma linha válida encontrada. Certifique-se de que a planilha tem as colunas: Código, CATEGORIA, Assessor.');
          }
          document.getElementById('import-status').textContent = `${esmeraldaRows.length} linhas encontradas — processando Esmeralda...`;
          document.getElementById('prog-fill').style.width = '40%';
          const result = await processEsmeraldaImport(esmeraldaRows,
            (pct, msg) => {
              document.getElementById('prog-fill').style.width = pct + '%';
              document.getElementById('import-status').textContent = msg;
            });
          document.getElementById('prog-fill').style.width = '100%';
          document.getElementById('import-status').textContent =
            `Concluído! ${result.atualizados} clientes atualizados · ${result.semCadastro} sem cadastro G5`;
          await auditLog('import', `Lista Esmeralda: ${result.atualizados} atualizados, ${result.assessoresNovos} assessores criados`);
          toast(`Esmeralda importada: ${result.atualizados} clientes atualizados, ${result.assessoresNovos} assessores criados.`, 'success', 6000);
        } else {
          // Fluxo G5 XLSX original
          const ws = wb.Sheets[wb.SheetNames[0]];
          let rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
          rows = rows.map(r => {
            const n = {};
            for (const [k,v] of Object.entries(r)) n[k.trim()] = String(v).trim() === '' ? null : String(v).trim();
            return n;
          });
          document.getElementById('import-status').textContent = `${rows.length} linhas encontradas. Processando...`;
          document.getElementById('prog-fill').style.width = '40%';
          const firstRow = rows[0] || {};
          const isEnvioBase = 'Envio' in firstRow && ('Qnt Envio' in firstRow || 'Soma' in firstRow);
          if (currentImportTab === 'envio' || isEnvioBase) {
            const result = await processEnvioImport(rows);
            document.getElementById('prog-fill').style.width = '100%';
            document.getElementById('import-status').textContent = `Concluído! ${result.total} registros · ${result.clientes} clientes`;
            await auditLog('import', `Base de Envio (XLSX): ${result.total} registros`);
            toast(`Base de envio importada: ${result.total} registros de ${result.clientes} clientes.`, 'success', 6000);
          } else {
            const log = await processImport(rows);
            document.getElementById('prog-fill').style.width = '100%';
            document.getElementById('import-status').textContent = `Concluído! ${log.novos.length} novos · ${log.alterados.length} alterados`;
            await auditLog('import', `Base G5 (XLSX): ${log.novos.length} novos, ${log.alterados.length} alterados`);
            toast(`Importação concluída: ${log.novos.length} novos, ${log.alterados.length} atualizados.`, 'success', 6000);
          }
        }
        setTimeout(() => pages.importacao(), 1500);
      }
    } catch (err) {
      console.error(err);
      toast('Erro ao processar o arquivo: ' + err.message, 'error');
      document.getElementById('import-status').textContent = 'Erro: ' + err.message;
    }
  }
};

// ===================== PAGE: DIVERGÊNCIAS =====================
pages.divergencias = async function() {
  updateTopbar('Divergências', 'Cruzamento entre integração e base de envio', '');

  const [_clientesDiv, reps, sistemas, chamados, envios] = await Promise.all([
    dbAll('clientes'), dbAll('representantes'), dbAll('sistemas'),
    dbAll('chamados'), dbAll('envios')
  ]);
  // ── RLS: filtrar clientes pelo vínculo do usuário ──
  const clientes = applyDataFilter(_clientesDiv, reps);

  if (envios.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <div class="empty-state-title">Nenhuma base de envio importada</div>
        <div class="empty-state-sub">Importe a Base de Envio na tela de Importação para visualizar as divergências.</div>
      </div>`;
    return;
  }

  // Build lookup indexes
  const repById = {}; for (const r of reps) repById[r.id] = r;
  const sysById = {}; for (const s of sistemas) sysById[s.id] = s;

  // Per client: group chamados
  const chamadosByCliente = {};
  for (const ch of chamados) {
    if (!chamadosByCliente[ch.fk_cliente]) chamadosByCliente[ch.fk_cliente] = [];
    chamadosByCliente[ch.fk_cliente].push(ch);
  }

  // Per client: group envios — unique tipoEnvio set + total qty
  const enviosByCliente = {};
  for (const ev of envios) {
    if (!enviosByCliente[ev.fk_cliente]) enviosByCliente[ev.fk_cliente] = { tipos: new Set(), total: 0, nomeCliente: ev.nomeCliente };
    enviosByCliente[ev.fk_cliente].tipos.add(ev.tipoEnvio.toUpperCase());
    enviosByCliente[ev.fk_cliente].total += ev.qntEnvio;
  }

  // Get period label
  const periodo = envios[0]?.periodo?.replace('~',' → ') || '';

  // Período available clientes codes (from envio base)
  const envioClienteCodes = new Set(Object.keys(enviosByCliente));

  // Build divergence lists
  const div1 = []; // Integração ativa + não enviando
  const div2 = []; // Sem integração ativa + enviando por integração
  const div3 = []; // Tipo de envio diverge do tipo de chamado ativo
  const div4 = []; // Mensalidade ativa + não enviando

  for (const c of clientes) {
    const cod = String(c.Codigo);
    const chs = chamadosByCliente[cod] || [];
    const envInfo = enviosByCliente[cod];
    const tiposEnvio = envInfo ? [...envInfo.tipos] : [];
    const rep = repById[c.fk_representante];
    const sys = sysById[c.fk_sistema];
    const tipoIntExpected = getTipoIntExpected(chs);
    const temIntAtiva = tipoIntExpected !== 'SEM_INT';
    const enviandoInt = tiposEnvio.some(t => ENVIO_CONV.has(t) || ENVIO_WS.has(t));
    const enviandoQualquer = tiposEnvio.length > 0;

    const row = { c, chs, tiposEnvio, rep, sys, tipoIntExpected, envInfo };

    // DIV 1: tem integração ativa + não está enviando nada no período
    if (temIntAtiva && !enviandoQualquer) div1.push(row);

    // DIV 2: sem integração ativa + está enviando por tipo de integração
    if (!temIntAtiva && enviandoInt) div2.push(row);

    // DIV 3: tipo de envio diverge do tipo de chamado ativo
    if (temIntAtiva && enviandoQualquer) {
      const tiposIntEnvio = tiposEnvio.filter(t => ENVIO_CONV.has(t) || ENVIO_WS.has(t));
      if (tiposIntEnvio.length > 0) {
        let diverge = false;
        if (tipoIntExpected === 'CONVENCIONAL' && tiposIntEnvio.some(t => ENVIO_WS.has(t))) diverge = true;
        if (tipoIntExpected === 'WEBSERVICE'   && tiposIntEnvio.some(t => ENVIO_CONV.has(t))) diverge = true;
        if (diverge) div3.push(row);
      }
    }

    // DIV 4: mensalidade ativa no sistema + não enviando
    if (sys && (Array.isArray(sys.id ? [sys] : []) || true)) {
      // Check sistema mensalidade
      const sysObj = sysById[c.fk_sistema];
      if (sysObj?.mensalidadeHabilitada && !enviandoQualquer) div4.push(row);
    }
  }

  // Collect all analistas from chamados for filter
  const analistaSet = [...new Set(chamados.map(ch=>ch.analista).filter(Boolean))].sort();
  const ufSet       = [...new Set(clientes.map(c=>c.UF).filter(Boolean))].sort();
  const tiposEnvioSet = [...new Set(envios.map(e=>e.tipoEnvio).filter(Boolean))].sort();

  // STATE
  let divFilters = { codigo:'', nome:'', rep:'', analista:'', sistema:'', uf:'', tipoEnvio:'', tipoChamado:'' };

  function matchRow(row) {
    const { c, chs, tiposEnvio, rep, sys } = row;
    const f = divFilters;
    if (f.codigo   && !String(c.Codigo).includes(f.codigo)) return false;
    if (f.nome     && !(c.NomeFantasia||c.RazaoSocial||'').toLowerCase().includes(f.nome.toLowerCase())) return false;
    if (f.rep      && String(c.fk_representante) !== f.rep) return false;
    if (f.uf       && c.UF !== f.uf) return false;
    if (f.sistema  && String(c.fk_sistema) !== f.sistema) return false;
    if (f.analista && !chs.some(ch => ch.analista === f.analista)) return false;
    if (f.tipoEnvio && !tiposEnvio.includes(f.tipoEnvio)) return false;
    if (f.tipoChamado) {
      const ativos = chs.filter(ch=>ch.integracaoAtiva);
      if (!ativos.some(ch=>(ch.tipoIntegracao||'').toLowerCase().includes(f.tipoChamado.toLowerCase()))) return false;
    }
    return true;
  }

  function renderEnvioChips(tipos) {
    return tipos.map(t => {
      let cls = 'div-badge noint';
      if (ENVIO_CONV.has(t)) cls = 'div-badge conv';
      else if (ENVIO_WS.has(t)) cls = 'div-badge ws';
      return `<span class="${cls}">${t}</span>`;
    }).join(' ');
  }

  function renderIntBadge(tipo) {
    if (tipo === 'CONVENCIONAL') return `<span class="div-badge conv">Convencional</span>`;
    if (tipo === 'WEBSERVICE')   return `<span class="div-badge ws">Webservice</span>`;
    return `<span class="div-badge noint">Sem Integração</span>`;
  }

  // All unique envio types across current dataset
  const ALL_ENVIO_TYPES = [...new Set(envios.map(e=>e.tipoEnvio))].sort();

  function renderRows(list) {
    const filtered = list.filter(matchRow);
    if (!filtered.length) return `<tr><td colspan="100" style="text-align:center;padding:20px;color:var(--text3)">Nenhuma divergência nesta categoria com os filtros aplicados.</td></tr>`;
    return filtered.map(({ c, chs, tiposEnvio, rep, sys, tipoIntExpected, envInfo }) => {
      // per-tipo qty map
      const qtyByTipo = {};
      if (envInfo) {
        const evs = envios.filter(ev => ev.fk_cliente === String(c.Codigo));
        for (const ev of evs) qtyByTipo[ev.tipoEnvio] = (qtyByTipo[ev.tipoEnvio]||0) + ev.qntEnvio;
      }
      const tipoCols = ALL_ENVIO_TYPES.map(t => {
        const q = qtyByTipo[t];
        return `<td style="font-size:11px;text-align:right;color:${q?'var(--navy)':'var(--border2)'};">${q?q.toLocaleString('pt-BR'):'—'}</td>`;
      }).join('');
      return `<tr>
        <td><span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${c.Codigo}</span></td>
        <td style="min-width:180px"><strong style="color:var(--text)">${c.NomeFantasia||c.RazaoSocial||'—'}</strong></td>
        <td><span class="badge uf">${c.UF||'?'}</span></td>
        <td style="font-size:12px">${rep?.nome||'—'}</td>
        <td style="font-size:12px">${sys?.nome||'—'}</td>
        <td>${renderIntBadge(tipoIntExpected)}</td>
        ${tipoCols}
      </tr>`;
    }).join('');
  }

  const TYPE_HEADERS = ALL_ENVIO_TYPES.map(t=>`<th style="text-align:right;white-space:nowrap;min-width:90px">${t}</th>`).join('');
  const COL_HEADERS = `
    <th>Código</th><th>Nome</th><th>UF</th><th>Representante</th>
    <th>Sistema</th><th>Int. Chamado</th>${TYPE_HEADERS}`;

  let accState = { d1:false, d2:false, d3:false, d4:false };

  function toggleAcc(key) {
    accState[key] = !accState[key];
    renderPage();
  }
  window._divToggleAcc = toggleAcc;

  function accSection(key, colorClass, icon, label, list) {
    const count = list.filter(matchRow).length;
    const isOpen = accState[key];
    return `
      <div class="accordion-section">
        <div class="accordion-header div-section-title ${colorClass} ${isOpen?'':'collapsed'}" onclick="toggleAcc('${key}')">
          <span class="acc-title">${icon} ${label} (${count})</span>
          <span class="accordion-chevron">›</span>
        </div>
        <div class="accordion-body ${isOpen?'open':''}" style="${isOpen?'':'display:none'}">
          <div class="div-table-wrap">
            <table style="width:100%;min-width:900px;table-layout:auto">
              <thead><tr>${COL_HEADERS}</tr></thead>
              <tbody>${renderRows(list)}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  function renderPage() {
    document.getElementById('div-content').innerHTML =
      accSection('d1','red',   '⚠', 'Integração Ativa sem Envio no Período', div1) +
      accSection('d2','amber', '⚠', 'Sem Integração Ativa enviando por Integração', div2) +
      accSection('d3','purple','⚠', 'Divergência entre Tipo de Chamado e Tipo de Envio', div3) +
      accSection('d4','teal',  '⚠', 'Mensalidade Ativa sem Envio no Período', div4);
  }

  document.getElementById('content').innerHTML = `
    <div style="font-size:12px;color:var(--text3);margin-bottom:16px">
      Período da base de envio: <strong style="color:var(--text2)">${periodo}</strong>
      · <span style="color:var(--text3)">${envioClienteCodes.size.toLocaleString('pt-BR')} clientes com envio registrado</span>
    </div>

    <!-- FILTERS -->
    <div class="toolbar" style="flex-wrap:wrap;gap:8px;margin-bottom:20px">
      <div class="search-wrap no-icon" style="flex:1;min-width:90px">
        <input type="text" id="df-codigo" placeholder="Código..." value="${divFilters.codigo}">
      </div>
      <div class="search-wrap" style="flex:2;min-width:160px">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
        <input type="text" id="df-nome" placeholder="Nome do cliente..." value="${divFilters.nome}">
      </div>
      <select id="df-uf" style="flex:0 0 auto">
        <option value="">Todas as UFs</option>
        ${ufSet.map(u=>`<option value="${u}" ${u===divFilters.uf?'selected':''}>${u}</option>`).join('')}
      </select>
      <select id="df-rep" style="flex:0 0 auto">
        <option value="">Todos os representantes</option>
        ${[...reps].sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR')).map(r=>`<option value="${r.id}" ${String(r.id)===divFilters.rep?'selected':''}>${r.nome}</option>`).join('')}
      </select>
      <select id="df-sistema" style="flex:0 0 auto">
        <option value="">Todos os sistemas</option>
        ${sistemas.map(s=>`<option value="${s.id}" ${String(s.id)===divFilters.sistema?'selected':''}>${s.nome}</option>`).join('')}
      </select>
      <select id="df-analista" style="flex:0 0 auto">
        <option value="">Todos os analistas</option>
        ${analistaSet.map(a=>`<option value="${a}" ${a===divFilters.analista?'selected':''}>${a}</option>`).join('')}
      </select>
      <select id="df-tipo-envio" style="flex:0 0 auto">
        <option value="">Todos tipos de envio</option>
        ${tiposEnvioSet.map(t=>`<option value="${t}" ${t===divFilters.tipoEnvio?'selected':''}>${t}</option>`).join('')}
      </select>
      <select id="df-tipo-chamado" style="flex:0 0 auto">
        <option value="">Todos tipos de chamado</option>
        <option value="Convencional" ${divFilters.tipoChamado==='Convencional'?'selected':''}>Convencional (XML)</option>
        <option value="Webservice" ${divFilters.tipoChamado==='Webservice'?'selected':''}>Webservice</option>
      </select>
      <button class="btn secondary" id="df-clear">Limpar filtros</button>
    </div>

    <div id="div-content"></div>
  `;

  renderPage();

  // Wire filters
  const wire = (id, key) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', e => {
      divFilters[key] = e.target.value;
      renderPage();
    });
  };
  wire('df-codigo',      'codigo');
  wire('df-nome',        'nome');
  wire('df-rep',         'rep');
  wire('df-uf',          'uf');
  wire('df-sistema',     'sistema');
  wire('df-analista',    'analista');
  wire('df-tipo-envio',  'tipoEnvio');
  wire('df-tipo-chamado','tipoChamado');

  document.getElementById('df-clear').addEventListener('click', () => {
    divFilters = { codigo:'', nome:'', rep:'', analista:'', sistema:'', uf:'', tipoEnvio:'', tipoChamado:'' };
    ['df-codigo','df-nome','df-rep','df-uf','df-sistema','df-analista','df-tipo-envio','df-tipo-chamado'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    renderPage();
  });
};

pages.propostas = async function() {
  updateTopbar('Propostas', 'Gestão de propostas comerciais', `<button class="btn" id="new-prop-btn">+ Nova Proposta</button>`);

  const [propostas, clientes, sistemas, chamados] = await Promise.all([
    dbAll('propostas'), dbAll('clientes'), dbAll('sistemas'), dbAll('chamados')
  ]);
  const clienteByCode = {}; for (const c of clientes) clienteByCode[c.Codigo] = c;
  const sysById = {}; for (const s of sistemas) sysById[s.id] = s;
  const analistaSet = [...new Set(chamados.map(ch=>ch.analista).filter(Boolean))].sort();

  let pSearch = '', pStatus = '', pSistema = '';

  function getStatusLabel(s) {
    return {pendente:'Pendente', aprovada:'Aprovada', paga:'Paga', cancelada:'Cancelada'}[s] || s;
  }

  async function renderPropostas() {
    // Re-fetch propostas from DB for immediate state update after create/edit/delete
    const propostas = await dbAll('propostas');
    let filtered = propostas.filter(p => {
      const c = clienteByCode[p.fk_cliente];
      const nome = c ? (c.NomeFantasia||c.RazaoSocial||'') : '';
      const ok = !pSearch || String(p.fk_cliente).includes(pSearch) || nome.toLowerCase().includes(pSearch.toLowerCase()) || String(p.numeroChamado||'').includes(pSearch);
      const stOk = !pStatus || p.status === pStatus;
      const sysOk = !pSistema || String(p.fk_sistema) === pSistema;
      return ok && stOk && sysOk;
    }).sort((a,b) => (b.dataLancamento||'').localeCompare(a.dataLancamento||''));

    const container = document.getElementById('prop-list');
    if (!container) return;
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📄</div><div class="empty-state-title">Nenhuma proposta encontrada</div></div>`;
      return;
    }
    container.innerHTML = filtered.map(p => {
      const c = clienteByCode[p.fk_cliente];
      const sys = sysById[p.fk_sistema];
      const nome = c ? (c.NomeFantasia||c.RazaoSocial) : `Cód. ${p.fk_cliente}`;
      return `<div class="table-wrap" style="margin-bottom:8px">
        <table style="width:100%"><tbody>
          <tr style="background:var(--bg2)">
            <td style="padding:12px 16px;width:120px">
              <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">#${p.fk_cliente}</span><br>
              <strong style="font-size:13px;color:var(--navy)">${nome}</strong>
            </td>
            <td style="padding:12px 16px">
              <div style="font-size:11px;color:var(--text3)">Chamado</div>
              <div style="font-size:13px">${p.numeroChamado||'—'}</div>
            </td>
            <td style="padding:12px 16px">
              <div style="font-size:11px;color:var(--text3)">Sistema</div>
              <div style="font-size:13px">${sys?.nome||'—'}</div>
            </td>
            <td style="padding:12px 16px">
              <div style="font-size:11px;color:var(--text3)">Analista</div>
              <div style="font-size:13px">${p.analista||'—'}</div>
            </td>
            <td style="padding:12px 16px;text-align:right">
              <div style="font-size:11px;color:var(--text3)">Proposta</div>
              <div style="font-size:14px;font-weight:700;color:var(--navy)">R$ ${Number(p.valorProposta||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
              ${p.valorMensalidade ? `<div style="font-size:11px;color:var(--text3)">Mens. R$ ${Number(p.valorMensalidade).toLocaleString('pt-BR',{minimumFractionDigits:2})} × ${p.numeroParcelas||1}</div>` : ''}
            </td>
            <td style="padding:12px 16px;text-align:center">
              <span class="prop-status ${p.status||'pendente'}">${getStatusLabel(p.status||'pendente')}</span>
            </td>
            <td style="padding:12px 16px">
              <div style="font-size:10px;color:var(--text3)">Lançamento: ${p.dataLancamento||'—'}</div>
              ${p.dataAprovacao ? `<div style="font-size:10px;color:var(--text3)">Aprovação: ${p.dataAprovacao}</div>` : ''}
              ${p.dataPagamento ? `<div style="font-size:10px;color:var(--text3)">Pagamento: ${p.dataPagamento}</div>` : ''}
              ${p.chaveNF ? `<div style="font-size:10px;color:var(--accent2)">NF: ${p.chaveNF}</div>` : ''}
            </td>
            <td style="padding:12px 16px;text-align:right;white-space:nowrap">
              <button class="btn sm secondary" data-edit-prop="${p.id}">Editar</button>
            </td>
          </tr>
        </tbody></table>
      </div>`;
    }).join('');

    container.querySelectorAll('[data-edit-prop]').forEach(btn => {
      btn.addEventListener('click', () => openPropostaModal(parseInt(btn.dataset.editProp), sistemas, analistaSet, clienteByCode, renderPropostas));
    });
  }

  document.getElementById('content').innerHTML = `
    <div class="toolbar" style="flex-wrap:wrap;gap:8px;margin-bottom:16px">
      <div class="search-wrap" style="flex:2;min-width:200px">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
        <input type="text" placeholder="Código, nome ou chamado..." id="prop-search">
      </div>
      <select id="prop-status">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="aprovada">Aprovada</option>
        <option value="paga">Paga</option>
        <option value="cancelada">Cancelada</option>
      </select>
      <select id="prop-sistema">
        <option value="">Todos os sistemas</option>
        ${sistemas.map(s=>`<option value="${s.id}">${s.nome}</option>`).join('')}
      </select>
    </div>
    <div id="prop-list"></div>
  `;

  renderPropostas();
  document.getElementById('prop-search').addEventListener('input', e => { pSearch=e.target.value; renderPropostas().catch(console.error); });
  document.getElementById('prop-status').addEventListener('change', e => { pStatus=e.target.value; renderPropostas().catch(console.error); });
  document.getElementById('prop-sistema').addEventListener('change', e => { pSistema=e.target.value; renderPropostas().catch(console.error); });
  document.getElementById('new-prop-btn').addEventListener('click', () => openPropostaModal(null, sistemas, analistaSet, clienteByCode, renderPropostas));
};

function openPropostaModal(id, sistemas, analistaSet, clienteByCode, refresh) {
  Promise.resolve(id ? dbGet('propostas', id) : null).then(p => {
    const isNew = !p;
    p = p || { fk_cliente:'', numeroChamado:'', fk_sistema:'', analista:'', valorProposta:0, valorMensalidade:0, numeroParcelas:1, dataLancamento:'', dataAprovacao:'', dataPagamento:'', chaveNF:'', status:'pendente' };
    const overlay = openModal(`
      <div class="modal-header">
        <div class="modal-title">${isNew?'Nova Proposta':'Editar Proposta'}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="two-col">
          <div class="field-group"><div class="field-label">Código do Laboratório *</div><input type="text" id="p-cod" value="${p.fk_cliente}"></div>
          <div class="field-group"><div class="field-label">Número do Chamado</div><input type="text" id="p-ch" value="${p.numeroChamado||''}"></div>
        </div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Sistema</div>
            <select id="p-sys"><option value="">— Nenhum —</option>${sistemas.map(s=>`<option value="${s.id}" ${s.id==p.fk_sistema?'selected':''}>${s.nome}</option>`).join('')}</select>
          </div>
          <div class="field-group"><div class="field-label">Analista</div>
            <input type="text" id="p-ana" list="p-ana-list" value="${p.analista||''}">
            <datalist id="p-ana-list">${analistaSet.map(a=>`<option value="${a}">`).join('')}</datalist>
          </div>
        </div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Valor da Proposta (R$)</div><input type="number" id="p-val" value="${p.valorProposta||0}" min="0" step="0.01"></div>
          <div class="field-group"><div class="field-label">Mensalidade (R$)</div><input type="number" id="p-mens" value="${p.valorMensalidade||0}" min="0" step="0.01"></div>
        </div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Nº de Parcelas</div><input type="number" id="p-parc" value="${p.numeroParcelas||1}" min="1" step="1"></div>
          <div class="field-group"><div class="field-label">Status</div>
            <select id="p-status">
              <option value="pendente"  ${p.status==='pendente' ?'selected':''}>Pendente</option>
              <option value="aprovada"  ${p.status==='aprovada' ?'selected':''}>Aprovada</option>
              <option value="paga"      ${p.status==='paga'     ?'selected':''}>Paga</option>
              <option value="cancelada" ${p.status==='cancelada'?'selected':''}>Cancelada</option>
            </select>
          </div>
        </div>
        <div class="section-divider">Datas</div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Data de Lançamento</div><input type="date" id="p-dt-lanc" value="${p.dataLancamento||''}"></div>
          <div class="field-group"><div class="field-label">Data de Aprovação</div><input type="date" id="p-dt-aprov" value="${p.dataAprovacao||''}"></div>
        </div>
        <div class="two-col">
          <div class="field-group"><div class="field-label">Data de Pagamento</div><input type="date" id="p-dt-pag" value="${p.dataPagamento||''}"></div>
          <div class="field-group"><div class="field-label">Chave da NF</div><input type="text" id="p-nf" value="${p.chaveNF||''}"></div>
        </div>
      </div>
      <div class="modal-footer">
        ${!isNew ? `<button class="btn danger" id="del-prop">Excluir</button>` : ''}
        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="save-prop">Salvar</button>
      </div>
    `);
    if (!isNew) overlay.querySelector('#del-prop')?.addEventListener('click', async () => {
      if (!confirm('Excluir esta proposta?')) return;
      await dbDelete('propostas', id); toast('Proposta excluída.','info'); closeModal(); refresh();
    });
    overlay.querySelector('#save-prop').addEventListener('click', async () => {
      const fk_cliente = overlay.querySelector('#p-cod').value.trim();
      if (!fk_cliente) { toast('Código do laboratório obrigatório.','error'); return; }
      const data = {
        fk_cliente, numeroChamado: overlay.querySelector('#p-ch').value.trim(),
        fk_sistema: parseInt(overlay.querySelector('#p-sys').value)||null,
        analista: overlay.querySelector('#p-ana').value.trim(),
        valorProposta: parseFloat(overlay.querySelector('#p-val').value)||0,
        valorMensalidade: parseFloat(overlay.querySelector('#p-mens').value)||0,
        numeroParcelas: parseInt(overlay.querySelector('#p-parc').value)||1,
        status: overlay.querySelector('#p-status').value,
        dataLancamento: overlay.querySelector('#p-dt-lanc').value,
        dataAprovacao: overlay.querySelector('#p-dt-aprov').value,
        dataPagamento: overlay.querySelector('#p-dt-pag').value,
        chaveNF: overlay.querySelector('#p-nf').value.trim(),
      };
      if (!isNew) data.id = id;
      await (isNew ? dbAdd : dbPut)('propostas', data);
      await auditLog(isNew?'Criou proposta':'Editou proposta', `Lab ${data.fk_cliente} · R$ ${data.valorProposta}`);
      toast(isNew?'Proposta criada.':'Proposta atualizada.','success');
      closeModal(); refresh();
    });
  });
}
